<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>多身份分支叙事 · 内容框架交互图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080e;color:#ccc;font-family:"Microsoft YaHei","PingFang SC",sans-serif;padding:24px 20px 80px}
h1{text-align:center;color:#d4af37;font-size:22px;letter-spacing:5px}
.sub{text-align:center;color:#555;font-size:11px;margin:4px 0 18px}

/* ── legend ── */
.legend{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-bottom:18px;font-size:11px;color:#666}
.legend .dot{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:3px;vertical-align:middle}

/* ── tree ── */
.tree{max-width:960px;margin:0 auto}
.node{margin:2px 0;border-radius:5px;overflow:hidden}
.node-bar{display:flex;align-items:center;padding:8px 12px;cursor:pointer;user-select:none;border-left:3px solid transparent;transition:background .15s}
.node-bar:hover{background:rgba(255,255,255,.03)}
.node-bar .arrow{width:18px;font-size:10px;color:#555;flex-shrink:0;transition:transform .2s}
.node-bar.open .arrow{transform:rotate(90deg)}
.node-bar .icon{width:22px;font-size:13px;flex-shrink:0;text-align:center}
.node-bar .label{flex:1;font-size:13px;line-height:1.5}
.node-bar .label .name{font-weight:bold}
.node-bar .label .desc{color:#777;font-size:11px;margin-left:6px}
.node-bar .note-btn{width:22px;height:22px;border-radius:50%;border:1px solid #333;background:transparent;color:#e0a020;font-size:11px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;opacity:.5;transition:opacity .15s}
.node-bar .note-btn:hover{opacity:1;border-color:#e0a020}
.node-children{display:none;padding-left:22px}
.node-bar.open+.node-children{display:block}

/* level colors */
.L0>.node-bar{border-left-color:#d4af37;background:#12120a}
.L0>.node-bar .name{color:#d4af37}
.L1-god>.node-bar{border-left-color:#7a3535}.L1-god>.node-bar .name{color:#e8cccc}
.L1-ass>.node-bar{border-left-color:#35357a}.L1-ass>.node-bar .name{color:#cccce8}
.L1-hei>.node-bar{border-left-color:#357a35}.L1-hei>.node-bar .name{color:#cce8cc}
.L-task>.node-bar{border-left-color:#444}.L-task>.node-bar .name{color:#bbb}
.L-choice>.node-bar{border-left-color:#e0a020;background:#13120a}.L-choice>.node-bar .name{color:#ffe080}
.L-emo>.node-bar{border-left-color:#9a7aba}.L-emo>.node-bar .name{color:#d4bce8}
.L-key>.node-bar{border-left-color:#d4af37;border-left-style:dashed}.L-key>.node-bar .name{color:#d4af37}
.L-fail>.node-bar{border-left-color:#884040}.L-fail>.node-bar .name{color:#e8a0a0}
.L-end>.node-bar{border-left-color:#555}
.L-male>.node-bar{border-left-color:#336}
.L-male>.node-bar .name{color:#aab8cc}

/* note panel */
.note-panel{display:none;margin:4px 0 8px 40px;padding:10px 14px;background:#111118;border:1px solid #2a2a3a;border-left:3px solid #e0a020;border-radius:4px;font-size:11px;line-height:1.8;color:#999}
.note-panel.open{display:block}
.note-panel strong{color:#e0a020;font-size:12px}
.note-panel ul{margin:4px 0 0 16px;list-style:disc}
.note-panel li{margin:2px 0}

/* reaction table */
.rtbl{border-collapse:collapse;font-size:11px;width:100%;margin:6px 0 4px}
.rtbl th{background:#16162a;color:#888;padding:4px 8px;border:1px solid #2a2a3a;font-weight:normal;font-size:10px;text-align:center;white-space:nowrap}
.rtbl td{padding:5px 8px;border:1px solid #1e1e2e;background:#0e0e14;color:#aaa;font-size:11px;line-height:1.5;vertical-align:top}
.rtbl td.ca{background:#12110a;color:#e0c080;font-weight:bold;text-align:center;vertical-align:middle;white-space:nowrap;width:90px}
.rtbl td.cb{background:#0a1015;color:#80b0e0;font-weight:bold;text-align:center;vertical-align:middle;white-space:nowrap;width:90px}

/* path table */
.ptbl{border-collapse:collapse;font-size:12px;margin:8px auto}
.ptbl caption{color:#d4af37;font-size:13px;font-weight:bold;padding-bottom:6px;letter-spacing:1px}
.ptbl th{background:#16162a;color:#888;padding:4px 12px;border:1px solid #2a2a3a;font-weight:normal;font-size:10px;white-space:nowrap}
.ptbl td{padding:4px 12px;border:1px solid #222;text-align:center;background:#111;color:#bbb;white-space:nowrap}
.ptbl .eb{background:#10201a;color:#aad4c0;font-weight:bold}
.ptbl .ev{background:#101a20;color:#aac0d4;font-weight:bold}
.ptbl .et{background:#1a1a10;color:#d4d4aa;font-weight:bold}
.ptbl .es{background:#201018;color:#d4aac0;font-weight:bold}

.path-wrap{display:flex;gap:24px;flex-wrap:wrap;justify-content:center;margin:10px 0}

/* choice card */
.ccards{display:flex;gap:12px;flex-wrap:wrap;margin:6px 0}
.ccard{flex:1 1 280px;background:#111118;border:1px solid #2a2a3a;border-radius:5px;padding:10px 12px;font-size:11px;line-height:1.7}
.ccard h6{font-size:12px;color:#d4af37;margin-bottom:6px;text-align:center}
.ccard .opt{padding:6px 8px;border-radius:3px;margin-bottom:6px}
.ccard .oa{background:#15150e;border-left:3px solid #e0c080}.ccard .oa b{color:#e0c080}
.ccard .ob{background:#0e1215;border-left:3px solid #80b0e0}.ccard .ob b{color:#80b0e0}
.ccard .opt .d{color:#888}
</style>
</head>

// ═══════════════════════════════════════════════
//  RENDERER
// ═══════════════════════════════════════════════
const tree = document.getElementById('tree');

function icon(type){
  const m={
    'L0':'&#9670;','L1-god':'&#9830;','L1-ass':'&#9830;','L1-hei':'&#9830;',
    'L-task':'&#9655;','L-choice':'&#10070;','L-emo':'&#9829;',
    'L-key':'&#9674;','L-fail':'&#10007;','L-end':'&#9632;','L-male':'&#8226;'
  };
  return m[type]||'&#9655;';
}

function renderNode(n, container){
  const div = document.createElement('div');
  div.className = 'node ' + n.type;
  const hasKids = (n.children && n.children.length>0) || n.html;
  // bar
  const bar = document.createElement('div');
  bar.className = 'node-bar';
  bar.innerHTML = `<span class="arrow">${hasKids?'&#9654;':'&nbsp;'}</span>`+
    `<span class="icon">${icon(n.type)}</span>`+
    `<span class="label"><span class="name">${n.name}</span>${n.desc?'<span class="desc">'+n.desc+'</span>':''}</span>`;
  // note button
  if(n.note){
    const nb = document.createElement('button');
    nb.className='note-btn';nb.textContent='i';
    nb.onclick=function(e){
      e.stopPropagation();
      const p=div.querySelector('.note-panel');
      if(p)p.classList.toggle('open');
    };
    bar.appendChild(nb);
  }
  div.appendChild(bar);
  // note panel
  if(n.note){
    const np = document.createElement('div');
    np.className='note-panel';
    np.innerHTML=`<strong>${n.note.title}</strong><ul>${n.note.items.map(i=>'<li>'+i+'</li>').join('')}</ul>`;
    div.appendChild(np);
  }
  // children container
  if(hasKids){
    const ch = document.createElement('div');
    ch.className='node-children';
    if(n.html){
      const hd = document.createElement('div');
      hd.innerHTML=n.html;
      hd.style.padding='4px 0 8px 22px';
      ch.appendChild(hd);
    }
    if(n.children){
      n.children.forEach(c=>renderNode(c,ch));
    }
    div.appendChild(ch);
    bar.onclick=function(){bar.classList.toggle('open')};
  }
  container.appendChild(div);
}

S.nodes.forEach(n=>renderNode(n,tree));
