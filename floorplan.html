<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>金笼 · 空间动线与钥匙分布</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080e;color:#ccc;font-family:"Microsoft YaHei","PingFang SC",sans-serif;padding:20px 16px 60px;display:flex;flex-direction:column;align-items:center}
h1{color:#d4af37;font-size:20px;letter-spacing:4px;margin-bottom:2px}
.sub{color:#555;font-size:11px;margin-bottom:14px}

/* selector */
.sel{display:flex;gap:24px;margin-bottom:16px;flex-wrap:wrap;justify-content:center}
.sel-group{display:flex;flex-direction:column;align-items:center;gap:5px}
.sel-label{font-size:10px;color:#666;letter-spacing:1px}
.sel-row{display:flex;gap:4px}
.sel-btn{padding:6px 16px;border:1px solid #333;background:#111;color:#777;font-size:12px;cursor:pointer;border-radius:3px;transition:all .15s;font-family:inherit}
.sel-btn:hover{border-color:#555;color:#aaa}
.sel-btn.on-god{border-color:#7a3535;color:#e8cccc;background:#2a1515}
.sel-btn.on-ass{border-color:#35357a;color:#cccce8;background:#15152a}
.sel-btn.on-hei{border-color:#357a35;color:#cce8cc;background:#153a15}
.sel-btn.on-he{border-color:#b08030;color:#ffe0a0;background:#1a1508}
.sel-btn.on-ban{border-color:#9060b0;color:#e0c0f0;background:#18101e}
.sel-btn.on-sho{border-color:#508080;color:#a0e0e0;background:#101a1a}
.combo-label{font-size:12px;color:#d4af37;min-height:18px;margin-bottom:4px;letter-spacing:1px}

/* map */
.map-wrap{position:relative;width:100%;max-width:820px}
svg{width:100%;height:auto}

/* depth labels */
.depth{font-size:10px;fill:#333;text-anchor:end;font-style:italic}

/* areas */
.area-rect{fill:#0c0c14;stroke:#222;stroke-width:1.5;rx:4;ry:4;transition:fill .3s,stroke .3s,filter .3s}
.area-label{fill:#444;font-size:12px;text-anchor:middle;dominant-baseline:central;pointer-events:none;transition:fill .3s}
.area-sub{fill:#2a2a2a;font-size:9px;text-anchor:middle;dominant-baseline:central;pointer-events:none;transition:fill .3s}
.area-exclusive{stroke-dasharray:6 3}

.area-rect.lit{fill:#16162a;stroke:#556;filter:drop-shadow(0 0 6px rgba(100,120,180,.25))}
.area-rect.lit-god{fill:#1e1210;stroke:#7a4535;filter:drop-shadow(0 0 6px rgba(180,100,80,.2))}
.area-rect.lit-ass{fill:#10101e;stroke:#4545a0;filter:drop-shadow(0 0 6px rgba(80,80,200,.2))}
.area-rect.lit-hei{fill:#101e10;stroke:#3a7a3a;filter:drop-shadow(0 0 6px rgba(80,180,80,.2))}
.area-rect.lit+.area-label,.area-rect.lit-god+.area-label,.area-rect.lit-ass+.area-label,.area-rect.lit-hei+.area-label{fill:#ddd}
.area-rect.lit~.area-sub,.area-rect.lit-god~.area-sub,.area-rect.lit-ass~.area-sub,.area-rect.lit-hei~.area-sub{fill:#777}

/* connections */
.conn{stroke:#1a1a1a;stroke-width:2;fill:none}
.conn.lit{stroke:#445;stroke-width:2.5;stroke-dasharray:6 4;animation:dash 1.2s linear infinite}
@keyframes dash{to{stroke-dashoffset:-20}}

/* route stops */
.stop{opacity:0;transition:opacity .3s}
.stop.show{opacity:1}
.stop circle{fill:#1a1508;stroke:#d4af37;stroke-width:1.5}
.stop text{fill:#d4af37;font-size:9px;text-anchor:middle;dominant-baseline:central;font-weight:bold}

/* key markers */
.key-marker{opacity:0;transition:opacity .3s}
.key-marker.show{opacity:1}
.key-diamond{fill:#b8960f;stroke:#d4af37;stroke-width:1.5}
.key-num{fill:#000;font-size:8px;text-anchor:middle;dominant-baseline:central;font-weight:bold}

/* route line */
.route-path{fill:none;stroke:#d4af37;stroke-width:1.5;stroke-dasharray:4 3;opacity:0;transition:opacity .4s}
.route-path.show{opacity:.5;animation:dash 2s linear infinite}

/* exclusive badge */
.excl-badge{font-size:8px;fill:#555;text-anchor:middle}

/* timeline */
.timeline-wrap{max-width:820px;width:100%;margin-top:10px;min-height:60px}
.timeline-title{font-size:11px;color:#555;letter-spacing:1px;margin-bottom:6px;padding-left:4px}
.timeline{display:flex;gap:6px;overflow-x:auto;padding:4px 0 10px;scrollbar-width:thin;scrollbar-color:#333 #111}
.tl-card{flex:0 0 auto;background:#111118;border:1px solid #222;border-radius:5px;padding:7px 11px;min-width:120px;max-width:180px;cursor:default;transition:border-color .15s,background .15s}
.tl-card:hover{border-color:#555;background:#151520}
.tl-card .phase{font-size:10px;color:#d4af37;margin-bottom:3px;white-space:nowrap}
.tl-card .area-name{font-size:12px;color:#ccc;margin-bottom:2px}
.tl-card .detail{font-size:10px;color:#666;line-height:1.5}
.tl-card .key-tag{display:inline-block;background:#1a1508;border:1px solid #d4af37;color:#d4af37;font-size:9px;padding:1px 5px;border-radius:2px;margin-top:3px}

.empty-hint{color:#444;font-size:12px;padding:16px 0;text-align:center}

/* legend */
.legend{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin:10px 0 4px;font-size:10px;color:#555}
.legend .dot{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:3px;vertical-align:middle}
</style>
</head>

// key area per female identity
const keyArea={
  god:{1:'back',2:'accounts',3:'hall',4:'underground',5:'secret'},
  ass:{1:'back',2:'accounts',3:'back',4:'underground',5:'secret'},
  hei:{1:'hall',2:'accounts',3:'hall',4:'underground',5:'secret'}
};

const fNames={god:'赌神',ass:'杀手',hei:'千金'};
const mNames={he:'荷官',ban:'老板',sho:'打手'};

let selF=null, selM=null;

function pickF(btn){
  document.querySelectorAll('[data-f]').forEach(b=>{b.className='sel-btn'});
  selF=btn.dataset.f;
  btn.classList.add('on-'+selF);
  update();
}
function pickM(btn){
  document.querySelectorAll('[data-m]').forEach(b=>{b.className='sel-btn'});
  selM=btn.dataset.m;
  btn.classList.add('on-'+selM);
  update();
}

function update(){
  const label=document.getElementById('comboLabel');
  // clear
  document.querySelectorAll('.area-rect').forEach(r=>{r.classList.remove('lit','lit-god','lit-ass','lit-hei')});
  document.querySelectorAll('.conn').forEach(c=>c.classList.remove('lit'));
  document.getElementById('stopsGroup').innerHTML='';
  document.getElementById('keysGroup').innerHTML='';
  document.getElementById('routePath').setAttribute('points','');
  document.getElementById('routePath').classList.remove('show');
  const tl=document.getElementById('timeline');

  if(!selF||!selM){
    label.textContent=selF?fNames[selF]+' × ?':selM?'? × '+mNames[selM]:'';
    tl.innerHTML='<div class="empty-hint">选择身份组合查看动线</div>';
    return;
  }

  const key=selF+'-'+selM;
  const combo=C[key];
  if(!combo){tl.innerHTML='<div class="empty-hint">无数据</div>';return;}

  label.textContent=fNames[selF]+' × '+mNames[selM];
  const litClass='lit-'+selF;

  // light up areas
  combo.lit.forEach(a=>{
    const r=document.getElementById('r-'+a);
    if(r)r.classList.add(litClass);
  });

  // light up connections between lit areas
  for(const c of conns){
    if(combo.lit.includes(c[0])&&combo.lit.includes(c[1])){
      const el=document.getElementById('c-'+c[0]+'-'+c[1]);
      if(el)el.classList.add('lit');
    }
  }

  // draw route path
  const pts=[];
  const visited={};
  combo.tl.forEach((entry,i)=>{
    const a=entry[0];
    const ad=areaData[a];
    // offset revisits slightly
    const visitCount=visited[a]||0;
    visited[a]=visitCount+1;
    const ox=(visitCount%3)*12 - 12;
    const oy=(visitCount%2)*8;
    pts.push((ad.cx+ox)+','+(ad.cy+oy));
  });
  const rp=document.getElementById('routePath');
  rp.setAttribute('points',pts.join(' '));
  rp.classList.add('show');

  // draw stop markers
  const sg=document.getElementById('stopsGroup');
  const visited2={};
  combo.tl.forEach((entry,i)=>{
    const a=entry[0];
    const ad=areaData[a];
    const vc=visited2[a]||0;
    visited2[a]=vc+1;
    const ox=vc*14-7;
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','stop show');
    // position: top-right of area rect, offset for multiple visits
    const sx=ad.cx+40+ox;
    const sy=ad.cy-22;
    g.innerHTML=`<circle cx="${sx}" cy="${sy}" r="8"/><text x="${sx}" y="${sy}">${i+1}</text>`;
    sg.appendChild(g);
  });

  // draw key markers
  const kg=document.getElementById('keysGroup');
  const ka=keyArea[selF];
  const kd=keyDesc[selF];
  const keyPositions={};
  for(let n=1;n<=5;n++){
    const a=ka[n];
    const ad=areaData[a];
    const kc=keyPositions[a]||0;
    keyPositions[a]=kc+1;
    const ox=kc*22-11;
    const kx=ad.cx+ox;
    const ky=ad.cy+22;
    const g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','key-marker show');
    // diamond shape
    const d=8;
    g.innerHTML=`<polygon class="key-diamond" points="${kx},${ky-d} ${kx+d},${ky} ${kx},${ky+d} ${kx-d},${ky}"/>
      <text class="key-num" x="${kx}" y="${ky}">${n}</text>`;
    // tooltip
    const title=document.createElementNS('http://www.w3.org/2000/svg','title');
    title.textContent='金筹码'+n+'：'+kd[n];
    g.appendChild(title);
    kg.appendChild(g);
  }

  // timeline
  tl.innerHTML='';
  combo.tl.forEach((entry,i)=>{
    const [area,phase,detail,keyNum]=entry;
    const card=document.createElement('div');
    card.className='tl-card';
    let html=`<div class="phase">${i+1}. ${phase}</div>`;
    html+=`<div class="area-name">${areaData[area].label}</div>`;
    html+=`<div class="detail">${detail}</div>`;
    if(keyNum!==null){
      html+=`<span class="key-tag">金筹码${keyNum} · ${kd[keyNum]}</span>`;
    }
    card.innerHTML=html;
    // hover highlight
    card.onmouseenter=function(){
      const r=document.getElementById('r-'+area);
      if(r)r.style.filter='drop-shadow(0 0 14px rgba(212,175,55,.5))';
    };
    card.onmouseleave=function(){
      const r=document.getElementById('r-'+area);
      if(r)r.style.filter='';
    };
    tl.appendChild(card);
  });
}
</script>
</body>
</html>
