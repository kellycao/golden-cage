<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>金笼 · 任务模拟器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080e;color:#ccc;font-family:"Microsoft YaHei","PingFang SC",sans-serif;min-height:100vh;display:flex;flex-direction:column}

/* ── header ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid #1a1a1a}
.header-left{display:flex;align-items:center;gap:12px}
.header h1{color:#d4af37;font-size:18px;letter-spacing:3px}
.header .switch-btn{padding:6px 16px;border:1px solid #d4af37;background:#111;color:#d4af37;font-size:12px;cursor:pointer;border-radius:3px;font-family:inherit;transition:all .15s;display:none;letter-spacing:1px}
.header .switch-btn:hover{border-color:#e8c050;color:#ffe0a0;background:#1a1508}
.header-right{display:flex;align-items:center;gap:12px}
.music-ctrl{display:none;align-items:center;gap:8px}
.music-btn{background:none;border:1px solid #333;border-radius:4px;padding:4px 10px;font-size:16px;cursor:pointer;color:#888;transition:all .2s}
.music-btn:hover{border-color:#d4af37;color:#d4af37}
.music-btn.playing{border-color:#d4af37;color:#d4af37}
.volume-slider{-webkit-appearance:none;appearance:none;width:70px;height:4px;background:#333;border-radius:2px;outline:none;cursor:pointer}
.volume-slider::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:12px;height:12px;background:#d4af37;border-radius:50%;cursor:pointer}
.volume-slider::-moz-range-thumb{width:12px;height:12px;background:#d4af37;border-radius:50%;border:none;cursor:pointer}
.key-counter{display:flex;align-items:center;gap:6px;color:#d4af37;font-size:14px;letter-spacing:1px}
.key-counter .key-icon{font-size:14px;opacity:.3;transition:opacity .3s,transform .3s}
.key-counter .key-icon.collected{opacity:1;transform:scale(1.15)}

/* ── main layout ── */
.game-wrap{display:flex;flex:1;overflow:hidden}
.map-panel{flex:0 0 66%;position:relative;display:flex;align-items:center;justify-content:center;padding:16px;overflow:hidden}
/* ── scene background ── */
.scene-bg{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center;opacity:0;transition:opacity 1.2s ease}
.scene-bg.show{opacity:.5}
.map-panel svg{position:relative;z-index:1}
.control-panel{flex:1;border-left:1px solid #1a1a1a;display:flex;flex-direction:column;overflow:hidden}

/* ── map svg ── */
.map-panel svg{width:100%;max-width:800px;height:auto}

/* ── SVG areas ── */
.depth{font-size:10px;fill:#667;text-anchor:end;font-style:italic}
.area-rect{fill:#0e0e18;stroke:#282830;stroke-width:1.5;rx:4;ry:4;opacity:.4;transition:fill .3s,stroke .3s,filter .3s,opacity .3s}
.area-label{fill:#8585a0;font-size:15px;text-anchor:middle;dominant-baseline:central;pointer-events:none;opacity:.9;transition:fill .3s,opacity .3s}
.area-sub{fill:#6a6a90;font-size:12px;text-anchor:middle;dominant-baseline:central;pointer-events:none;opacity:.9;transition:fill .3s,opacity .3s}
.conn{stroke:#2a2a2a;stroke-width:2;fill:none;transition:stroke .3s}

/* area lit states — only active area is highlighted */
.area-rect.active{fill:#1e1210;stroke:#7a4535;opacity:1;filter:drop-shadow(0 0 6px rgba(180,100,80,.2));animation:area-pulse 2s infinite}
.area-rect.active+.area-label{fill:#eee;opacity:1}
.area-rect.active+.area-label+.area-sub{fill:#888;opacity:1}

/* connection locks */
.conn.conn-exclusive{stroke-dasharray:6 3}
/* unlock animation */
@keyframes area-unlock{0%{filter:drop-shadow(0 0 0 transparent)}50%{filter:drop-shadow(0 0 20px rgba(212,175,55,.6))}100%{filter:none}}
.area-rect.unlocking{animation:area-unlock .8s ease-out}

/* key markers on map */
.map-key{transition:opacity .4s,transform .3s}
.map-key.collected{opacity:0;transform:scale(1.3)}
.map-key-icon{fill:#d4af37;font-size:13px;dominant-baseline:central;text-anchor:middle}

/* avatar markers */
.avatar{transition:transform .6s ease}
.avatar-circle{stroke-width:2}
.avatar-text{text-anchor:middle;dominant-baseline:central;font-weight:bold;pointer-events:none}
.avatar-name{font-size:10px;fill:#d4af37;pointer-events:none;font-weight:bold}
.avatar-img{pointer-events:none}
.npc-icon{font-size:14px;text-anchor:middle;dominant-baseline:central;pointer-events:none}
.npc-label{font-size:10px;fill:#d4af37;pointer-events:none;text-anchor:start;dominant-baseline:central}

@keyframes area-pulse{0%,100%{filter:drop-shadow(0 0 6px rgba(212,175,55,.2))}50%{filter:drop-shadow(0 0 16px rgba(212,175,55,.5))}}
@keyframes conn-dash{to{stroke-dashoffset:-20}}

/* ── control panel sections ── */
.panel-scroll{flex:1;overflow-y:auto;padding:20px;scrollbar-width:thin;scrollbar-color:#333 #0c0c0c}
.panel-scroll::-webkit-scrollbar{width:6px}
.panel-scroll::-webkit-scrollbar-track{background:#0c0c0c}
.panel-scroll::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

/* ── identity selector ── */
.identity-selector{padding:40px 20px;text-align:center}
.identity-selector h2{color:#d4af37;font-size:16px;letter-spacing:2px;margin-bottom:24px}
.sel-group{margin-bottom:20px}
.sel-label{font-size:11px;color:#666;letter-spacing:1px;margin-bottom:8px}
.sel-row{display:flex;gap:6px;justify-content:center;flex-wrap:wrap}
.sel-btn{padding:8px 20px;border:1px solid #333;background:#111;color:#777;font-size:13px;cursor:pointer;border-radius:4px;transition:all .15s;font-family:inherit;position:relative}
.sel-btn:hover:not(.disabled){border-color:#555;color:#aaa}
.sel-btn.disabled{opacity:.35;cursor:not-allowed}
.sel-btn .coming{position:absolute;top:-8px;right:-8px;font-size:8px;color:#555;background:#111;border:1px solid #333;padding:1px 4px;border-radius:2px;white-space:nowrap}
.sel-btn.on-god{border-color:#7a3535;color:#e8cccc;background:#2a1515}
.sel-btn.on-he{border-color:#b08030;color:#ffe0a0;background:#1a1508}
.combo-label{font-size:14px;color:#d4af37;margin:16px 0;min-height:20px;letter-spacing:1px}
.start-btn{padding:10px 36px;border:1px solid #d4af37;background:#1a1508;color:#d4af37;font-size:14px;cursor:pointer;border-radius:4px;font-family:inherit;letter-spacing:2px;transition:all .2s;display:none}
.start-btn:hover{background:#2a2010;border-color:#e8c84a}
.start-btn.show{display:inline-block}

/* ── task display ── */
.task-display{display:none}
.task-header{display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.badge{padding:4px 12px;border-radius:4px;font-size:14px;font-weight:bold;letter-spacing:2px}
.badge-S{background:#3a2a10;color:#d4af37;border:1px solid #d4af37;animation:badge-pulse 2s infinite}
.badge-A{background:#2a2010;color:#e0a030;border:1px solid #5a4020}
.badge-B{background:#1a1a1a;color:#888;border:1px solid #333}
.badge-cat{padding:4px 12px;border-radius:4px;font-size:14px;letter-spacing:2px}
.badge-事业{background:#101520;color:#8090c0;border:1px solid #2a3050}
.badge-情感{background:#1a1018;color:#c090b0;border:1px solid #3a2030}
.badge-探索{background:#101a10;color:#80b080;border:1px solid #203a20}
@keyframes badge-pulse{0%,100%{box-shadow:0 0 4px rgba(212,175,55,.2)}50%{box-shadow:0 0 12px rgba(212,175,55,.5)}}

.task-title{font-size:16px;color:#eee;margin-bottom:10px;line-height:1.5}
.task-location{font-size:11px;color:#666;margin-bottom:12px}
.task-location span{color:#d4af37}
.task-desc{font-size:13px;color:#999;line-height:1.8;margin-bottom:16px;padding:12px;background:#0a0a12;border-left:3px solid #222;border-radius:0 4px 4px 0}

/* ── action area ── */
.action-area{margin-top:8px;display:flex;flex-direction:column;gap:8px}
.action-btn{padding:10px 16px;border:1px solid #333;background:#111118;color:#ccc;font-size:13px;cursor:pointer;border-radius:4px;font-family:inherit;transition:all .15s;text-align:left}
.action-btn:hover{border-color:#556;background:#16162a;color:#eee}
.action-btn.done{opacity:.4;cursor:default;border-color:#222}
.action-btn .btn-label{font-weight:bold;margin-bottom:4px}
.action-btn .btn-desc{font-size:11px;color:#888;line-height:1.5}
.action-btn.choice-btn{border-left:3px solid #d4af37}
.action-btn.choice-btn:hover{border-left-color:#e8c84a}
.action-btn.exec-btn{border-color:#446;background:#10101e;text-align:center;color:#aab8dd}
.action-btn.exec-btn:hover{background:#16162e;border-color:#558}
.key-pickup-btn{border-color:#d4af37 !important;background:#1a1508 !important;color:#d4af37 !important}
.key-pickup-btn:hover{background:#2a2010 !important}

/* ── result panel ── */
.result-panel{display:none;margin-top:16px;padding:14px;background:#0c0c14;border:1px solid #222;border-radius:5px;animation:fadeIn .3s ease}
.result-panel.show{display:block}
.result-text{font-size:13px;color:#bbb;line-height:1.8;margin-bottom:10px}
.result-male{font-size:12px;color:#b08030;line-height:1.7;padding:8px 10px;background:#12100a;border-left:2px solid #b08030;border-radius:0 3px 3px 0;margin-bottom:12px}
.result-male::before{content:'荷官';font-size:10px;color:#886020;display:block;margin-bottom:4px;letter-spacing:1px}
.result-btns{display:flex;gap:10px;justify-content:center;margin-top:4px}
.continue-btn{padding:8px 24px;border:1px solid #446;background:#10101e;color:#aab8dd;font-size:13px;cursor:pointer;border-radius:4px;font-family:inherit;transition:all .15s}
.continue-btn:hover{background:#16162e;border-color:#558}
.reset-btn{padding:8px 20px;border:1px solid #664;background:#1a1a10;color:#ccbb88;font-size:12px;cursor:pointer;border-radius:4px;font-family:inherit;transition:all .15s;display:none}
.reset-btn:hover{background:#22200a;border-color:#886}
.back-btn{padding:4px 12px;border:1px solid #444;background:transparent;color:#888;font-size:11px;cursor:pointer;border-radius:3px;font-family:inherit;transition:all .15s;margin-bottom:8px}
.back-btn:hover{border-color:#666;color:#bbb}

/* ── ending screen ── */
.ending-screen{display:none;text-align:center;padding:40px 20px;position:relative;overflow:hidden}
.ending-screen.show{display:block}
.ending-title{font-size:28px;font-weight:bold;letter-spacing:6px;margin-bottom:16px;animation:fadeSlideUp .8s ease}
.ending-subtitle{font-size:13px;color:#888;margin-bottom:20px;letter-spacing:2px}
.ending-text{font-size:13px;color:#aaa;line-height:2;margin-bottom:24px;text-align:left;padding:16px;background:rgba(0,0,0,.3);border-radius:6px}
.ending-bing .ending-title{color:#7acc7a}
.ending-bei .ending-title{color:#7a9acc}
.ending-tuo .ending-title{color:#cccc7a}
.ending-sha .ending-title{color:#cc7a9a}
.ending-funny .ending-title{color:#d4af37;font-size:22px}
.ending-funny .game-over{font-size:16px;color:#d4af37;letter-spacing:4px;margin:16px 0}
.ending-achievement{display:inline-block;padding:4px 12px;border:1px dashed #d4af37;color:#d4af37;font-size:12px;border-radius:3px;margin:8px 0}
.retry-btn{padding:8px 24px;border:1px solid #d4af37;background:#1a1508;color:#d4af37;font-size:13px;cursor:pointer;border-radius:4px;font-family:inherit;transition:all .15s;margin-top:12px}
.retry-btn:hover{background:#2a2010}

/* ── confirm modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-overlay.show{display:flex}
.modal-box{background:#111118;border:1px solid #333;border-radius:8px;padding:24px 32px;text-align:center;max-width:360px}
.modal-box p{font-size:14px;color:#ccc;margin-bottom:16px;line-height:1.6}
.modal-btns{display:flex;gap:12px;justify-content:center}
.modal-btns button{padding:8px 20px;border-radius:4px;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
.modal-confirm{border:1px solid #884040;background:#201010;color:#e8a0a0}
.modal-confirm:hover{background:#2a1515}
.modal-cancel{border:1px solid #446;background:#10101e;color:#aab8dd}
.modal-cancel:hover{background:#16162e}

/* ── key toast ── */
.key-toast-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center}
.key-toast-overlay.show{display:flex}
.key-toast{background:#111118;border:2px solid #d4af37;border-radius:12px;padding:28px 40px;text-align:center;animation:fadeSlideUp .5s ease;box-shadow:0 0 40px rgba(212,175,55,.25)}
.key-toast .kt-icon{width:40px;height:40px;background:#d4af37;transform:rotate(45deg);margin:0 auto 16px;box-shadow:0 0 20px rgba(212,175,55,.5)}
.key-toast .kt-title{font-size:18px;color:#d4af37;font-weight:bold;letter-spacing:3px;margin-bottom:8px}
.key-toast .kt-desc{font-size:13px;color:#999;line-height:1.6;margin-bottom:4px}
.key-toast .kt-count{font-size:13px;color:#d4af37;margin-top:10px;letter-spacing:1px}
.key-toast .kt-btn{display:inline-block;margin-top:14px;padding:8px 28px;border:1px solid #d4af37;background:#1a1508;color:#d4af37;font-size:14px;cursor:pointer;border-radius:4px;font-family:inherit;letter-spacing:2px;transition:all .15s}
.key-toast .kt-btn:hover{background:#2a2010;border-color:#e8c84a}

/* ── firework particles ── */
.firework{position:absolute;width:6px;height:6px;border-radius:50%;background:#d4af37;pointer-events:none;animation:firework-fly 1.2s ease-out forwards}
@keyframes firework-fly{0%{transform:translate(0,0) scale(1);opacity:1}100%{opacity:0}}

/* ── animations ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ── responsive: mobile ── */
@media(max-width:900px){
  .header{padding:6px 12px}
  .header h1{font-size:14px;letter-spacing:1px}
  .game-wrap{flex-direction:column}
  .map-panel{flex:none;height:50vh;padding:0;overflow:hidden}
  .map-panel svg{width:100%;height:100%;max-width:none}
  .scene-bg{background-size:100% 100%}
  .control-panel{flex:1;border-left:none;border-top:1px solid #1a1a1a;overflow:auto;-webkit-overflow-scrolling:touch}
  /* 字体适配 */
  .task-title{font-size:14px}
  .task-desc{font-size:12px;padding:8px;margin-bottom:10px}
  .task-location{font-size:10px}
  .result-text{font-size:12px}
  .result-male{font-size:11px;padding:6px 8px}
  .action-btn{font-size:12px;padding:8px 12px}
  .action-btn .btn-desc{font-size:10px}
  .continue-btn,.reset-btn,.retry-btn{font-size:12px;padding:6px 16px}
  .badge,.badge-cat{font-size:12px;padding:3px 8px}
  .ending-title{font-size:20px}
  .ending-text{font-size:12px;padding:10px}
  .ending-subtitle{font-size:11px}
  .back-btn{font-size:10px}
  .identity-selector h2{font-size:14px}
  .sel-btn{font-size:11px;padding:6px 14px}
  .combo-label{font-size:12px}
  .start-btn{font-size:12px;padding:8px 24px}
}
</style>
</head>
<body>

<!-- header -->
<div class="header">
  <div class="header-left">
    <h1>金笼 · 任务模拟器</h1>
    <button class="switch-btn" id="switchBtn" onclick="confirmSwitch()">切换身份</button>
  </div>
  <div class="header-right">
    <div class="music-ctrl" id="musicCtrl">
      <button class="music-btn" id="musicBtn" onclick="toggleMusic()" title="背景音乐">🔇</button>
      <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="100" oninput="setVolume(this.value)">
    </div>
    <div class="key-counter" id="keyCounter">
      <span class="key-icon" id="kd1">🔑</span>
      <span class="key-icon" id="kd2">🔑</span>
      <span class="key-icon" id="kd3">🔑</span>
      <span class="key-icon" id="kd4">🔑</span>
      <span class="key-icon" id="kd5">🔑</span>
    </div>
  </div>
</div>

<!-- 背景音乐（双轨交叉淡入淡出） -->
<audio id="audioA" preload="auto"></audio>
<audio id="audioB" preload="auto"></audio>

<!-- main layout -->
<div class="game-wrap">
  <!-- left: map -->
  <div class="map-panel" id="mapPanel">
    <div class="scene-bg" id="sceneBg"></div>
    <svg viewBox="0 0 800 660" xmlns="http://www.w3.org/2000/svg" id="mapSvg">

      <!-- connections -->
      <line class="conn" id="c-tower-hall" x1="400" y1="62" x2="400" y2="105"/>
      <line class="conn" id="c-vip-hall" x1="210" y1="150" x2="275" y2="150"/>
      <line class="conn" id="c-hall-accounts" x1="535" y1="150" x2="598" y2="150"/>
      <line class="conn" id="c-hall-back" x1="400" y1="205" x2="400" y2="262"/>
      <line class="conn" id="c-back-underground" x1="400" y1="320" x2="400" y2="375"/>
      <line class="conn" id="c-underground-arena" x1="255" y1="430" x2="185" y2="430"/>
      <line class="conn" id="c-underground-secret" x1="400" y1="485" x2="400" y2="552"/>
      <line class="conn" id="c-secret-study" x1="495" y1="580" x2="548" y2="580"/>

      <!-- areas -->
      <rect class="area-rect" id="r-tower" x="340" y="12" width="120" height="50"/>
      <text class="area-label" x="400" y="27">钟楼天台</text>
      <text class="area-sub" x="400" y="47">荷官专属</text>

      <rect class="area-rect" id="r-vip" x="60" y="110" width="150" height="80"/>
      <text class="area-label" x="135" y="140">绸缎阁</text>
      <text class="area-sub" x="135" y="160">VIP · 情报接头</text>

      <rect class="area-rect" id="r-hall" x="275" y="105" width="260" height="100"/>
      <text class="area-label" x="405" y="145">大 厅</text>
      <text class="area-sub" x="405" y="165">赌场主厅 · 锦标赛会场</text>

      <rect class="area-rect" id="r-accounts" x="598" y="110" width="140" height="80"/>
      <text class="area-label" x="668" y="140">账 房</text>
      <text class="area-sub" x="668" y="160">财务 · 吴半城</text>

      <rect class="area-rect" id="r-back" x="300" y="262" width="200" height="58"/>
      <text class="area-label" x="400" y="281">后台走廊</text>
      <text class="area-sub" x="400" y="301">扣押室 · 金库</text>

      <rect class="area-rect" id="r-underground" x="255" y="375" width="290" height="110"/>
      <text class="area-label" x="400" y="420">地 下 层</text>
      <text class="area-sub" x="400" y="440">走私通道 · 囚室 · 军火库</text>

      <rect class="area-rect" id="r-arena" x="60" y="395" width="125" height="70"/>
      <text class="area-label" x="122" y="420">斗兽场</text>
      <text class="area-sub" x="122" y="440">打手专属</text>

      <rect class="area-rect" id="r-secret" x="315" y="552" width="180" height="60"/>
      <text class="area-label" x="405" y="572">密 室</text>
      <text class="area-sub" x="405" y="592">核心机密 · 保险箱</text>

      <rect class="area-rect" id="r-study" x="548" y="552" width="150" height="60"/>
      <text class="area-label" x="623" y="572">密室·书房</text>
      <text class="area-sub" x="623" y="592">老板专属</text>

      <!-- locks layer (on connections) -->
      <g id="locksGroup"></g>
      <!-- key markers layer -->
      <g id="keysGroup"></g>
      <!-- avatar layer -->
      <g id="avatarsGroup"></g>
    </svg>
  </div>

  <!-- right: control panel -->
  <div class="control-panel">
    <div class="panel-scroll" id="panelScroll">

      <!-- identity selector (shown at start) -->
      <div class="identity-selector" id="identitySelector">
        <h2>选择身份组合</h2>
        <div class="sel-group">
          <div class="sel-label">女主身份</div>
          <div class="sel-row">
            <button class="sel-btn" data-f="god" onclick="pickF(this)">赌神</button>
            <button class="sel-btn disabled" data-f="ass">杀手<span class="coming">即将开放</span></button>
            <button class="sel-btn disabled" data-f="hei">千金<span class="coming">即将开放</span></button>
          </div>
        </div>
        <div class="sel-group">
          <div class="sel-label">男主身份</div>
          <div class="sel-row">
            <button class="sel-btn" data-m="he" onclick="pickM(this)">荷官</button>
            <button class="sel-btn disabled" data-m="ban">老板<span class="coming">即将开放</span></button>
            <button class="sel-btn disabled" data-m="sho">打手<span class="coming">即将开放</span></button>
          </div>
        </div>
        <div class="combo-label" id="comboLabel"></div>
        <button class="start-btn" id="startBtn" onclick="startGame()">开始游戏</button>
      </div>

      <!-- task display (hidden until game starts) -->

// ── Avatar System ──
const avatarDefs = {
  female_god: { img:'avatar-female.png', size:32, name:'赌神', nameColor:'#c04040' },
  male_he:    { img:'avatar-male.png', size:30, name:'荷官' },

function createAvatars() {
  const ag = document.getElementById('avatarsGroup');
  ag.innerHTML = '';
  const fDef = avatarDefs['female_'+gameState.femaleId];
  const mDef = avatarDefs['male_'+gameState.maleId];
  if(fDef) makeMainAvatar(ag, 'av-female', fDef, 405, 155);
  if(mDef) makeMainAvatar(ag, 'av-male', mDef, 405, 155);
  // Create all NPCs at their home positions
  const combo = gameState.femaleId + '-' + gameState.maleId;
  const npcs = npcHome[combo] || [];
  npcs.forEach(npc => {
    const def = avatarDefs['npc_'+npc.id];
    if(!def) return;
    const a = areaData[npc.area];
    if(!a) return;
    const ns = def.npcSize || 28;
    const x = a.left + a.w - ns/2 - 6;
    const y = a.top + a.h / 2;
    makeNpcAvatar(ag, 'av-npc-'+npc.id, def, x, y);
  });
}

function makeMainAvatar(parent, id, def, x, y) {
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('id', id);
  g.setAttribute('class','avatar');
  g.setAttribute('transform',`translate(${x},${y})`);
  const s = def.size || 32;
  // Image
  const imgEl = document.createElementNS('http://www.w3.org/2000/svg','image');
  imgEl.setAttribute('class','avatar-img');
  imgEl.setAttribute('x', -s/2);
  imgEl.setAttribute('y', -s/2);
  imgEl.setAttribute('width', s);
  imgEl.setAttribute('height', s);
  imgEl.setAttributeNS('http://www.w3.org/1999/xlink','href', def.img);
  imgEl.setAttribute('href', def.img);
  g.appendChild(imgEl);
  // Vertical name label to the right, vertically centered with icon
  if(def.name){
    const chars = def.name.split('');
    const lineH = 13;
    const totalTextH = chars.length * lineH;
    const startY = -totalTextH / 2 + lineH / 2;
    const nameColor = def.nameColor || '#d4af37';
    chars.forEach((ch,i)=>{
      const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('class','avatar-name');
      txt.setAttribute('x', s/2 + 6);
      txt.setAttribute('y', startY + i * lineH);
      txt.setAttribute('text-anchor','start');
      txt.setAttribute('fill', nameColor);
      txt.textContent = ch;
      g.appendChild(txt);
    });
  }
  parent.appendChild(g);
  return g;
}

function makeNpcAvatar(parent, id, def, x, y) {
  const g = document.createElementNS('http://www.w3.org/2000/svg','g');
  g.setAttribute('id', id);
  g.setAttribute('class','avatar avatar-npc');
  g.setAttribute('transform',`translate(${x},${y})`);
  const ns = def.npcSize || 28;
  // SVG vector silhouette: head + shoulders
  const silhouette = document.createElementNS('http://www.w3.org/2000/svg','g');
  const scale = ns / 28;
  silhouette.setAttribute('transform',`translate(${-ns/2},${-ns/2}) scale(${scale})`);
  // Head circle
  const head = document.createElementNS('http://www.w3.org/2000/svg','circle');
  head.setAttribute('cx','14'); head.setAttribute('cy','9');
  head.setAttribute('r','7'); head.setAttribute('fill','#667');
  silhouette.appendChild(head);
  // Shoulders arc
  const body = document.createElementNS('http://www.w3.org/2000/svg','path');
  body.setAttribute('d','M2 28 Q2 20 8 18 Q11 16 14 16 Q17 16 20 18 Q26 20 26 28 Z');
  body.setAttribute('fill','#667');
  silhouette.appendChild(body);
  g.appendChild(silhouette);
  // Vertical name label to the left of icon, vertically centered
  if(def.name){
    const chars = def.name.split('');
    const lineH = 11;
    const totalTextH = chars.length * lineH;
    const startY = -totalTextH / 2 + lineH / 2;
    chars.forEach((ch,i)=>{
      const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
      txt.setAttribute('class','npc-label');
      txt.setAttribute('x', -ns/2 - 4);
      txt.setAttribute('y', startY + i * lineH);
      txt.setAttribute('text-anchor','end');
      txt.textContent = ch;
      g.appendChild(txt);
    });
  }
  parent.appendChild(g);
  return g;
}

function updateAvatars(task) {
  if(!task || !task.characters) return;
  const chars = typeof task.characters === 'function' ? task.characters(gameState) : task.characters;
  const fDef = avatarDefs['female_'+gameState.femaleId];
  const mDef = avatarDefs['male_'+gameState.maleId];
  const sf = fDef ? fDef.size || 32 : 32;
  const sm = mDef ? mDef.size || 32 : 32;

  function moveMale() {
    if(chars.male){
      const a = areaData[chars.male];
      if(a){
        const sameArea = chars.female === chars.male;
        const x = a.left + sm/2 + 4;
        const y = sameArea ? a.top + a.h/2 + sf/2 + 2 : a.top + a.h/2;
        const el = document.getElementById('av-male');
        if(el) el.setAttribute('transform',`translate(${x},${y})`);
      }
    }
  }

  function moveFemale() {
    if(chars.female){
      const a = areaData[chars.female];
      if(a){
        const sameArea = chars.female === chars.male;
        const x = a.left + sf/2 + 4;
        const y = sameArea ? a.top + a.h/2 - sm/2 - 2 : a.top + a.h/2;
        const el = document.getElementById('av-female');
        if(el) el.setAttribute('transform',`translate(${x},${y})`);
      }
    }
  }

  if (task.maleFirst) {
    moveMale();
    setTimeout(moveFemale, 500);
  } else {
    moveMale();
    moveFemale();
  }

  // Move NPCs to task-specified positions, or leave at home
  const combo = gameState.femaleId + '-' + gameState.maleId;
  const allNpcs = npcHome[combo] || [];
  allNpcs.forEach(npc => {
    const el = document.getElementById('av-npc-'+npc.id);
    if(!el) return;
    const taskNpc = chars.npcs ? chars.npcs.find(n => n.id === npc.id) : null;
    const area = taskNpc ? taskNpc.area : npc.area;
    const def = avatarDefs['npc_'+npc.id];
    const a = areaData[area];
    if(!a || !def) return;
    const ns = def.npcSize || 28;
    const x = a.left + a.w - ns/2 - 6;
    const y = a.top + a.h / 2;
    el.setAttribute('transform', `translate(${x},${y})`);
  });
}

// ── Render Current Task ──
function renderTask() {
  if(!questChain) return;
  const task = questChain[gameState.currentTaskIndex];
  if(!task) return;

  const display = document.getElementById('taskDisplay');
  display.style.display = 'block';
  document.getElementById('endingScreen').style.display = 'none';
  document.getElementById('endingScreen').classList.remove('show');

  // Show/hide back button
  document.getElementById('backBtn').style.display = gameState.history.length ? 'inline-block' : 'none';

  // Handle ending type
  if(task.type === 'ending'){
    showEnding();
    return;
  }

  // Header badges
  const header = document.getElementById('taskHeader');
  let badgeHtml = '';
  if(task.grade) badgeHtml += `<span class="badge badge-${task.grade}">${task.grade}</span>`;
  if(task.category) badgeHtml += `<span class="badge-cat badge-${task.category}">${task.category}</span>`;
  header.innerHTML = badgeHtml;

  // Title
  document.getElementById('taskTitle').textContent = task.title;

  // Location
  const locEl = document.getElementById('taskLocation');
  if(task.location && areaData[task.location]){
    locEl.innerHTML = '场景：<span>' + areaData[task.location].label + '</span>';
    locEl.style.display = '';
  } else {
    locEl.style.display = 'none';
  }

  // Description (may be function for cascade)
  const desc = typeof task.description === 'function' ? task.description(gameState) : task.description;
  document.getElementById('taskDesc').innerHTML = desc.replace(/\n/g,'<br>');

  // Action area
  const actionArea = document.getElementById('actionArea');
  actionArea.innerHTML = '';

  // Hide result panel and reset button
  const resultPanel = document.getElementById('resultPanel');
  resultPanel.classList.remove('show');
  document.getElementById('resetBtn').style.display = 'none';

  if(task.type === 'fixed'){
    // Single execute button
    if(task.canFail){
      // Show success/fail as a pair
      const successBtn = document.createElement('button');
      successBtn.className = 'action-btn exec-btn';
      successBtn.textContent = task.actionLabel || '成功';
      successBtn.onclick = function(){ executeFixed(task); };
      actionArea.appendChild(successBtn);
      const failBtn = document.createElement('button');
      failBtn.className = 'action-btn';
      failBtn.style.cssText = 'border-color:#883333;color:#cc8888;background:#1a1010;text-align:center';
      failBtn.textContent = task.failLabel || '失败';
      failBtn.onclick = function(){ triggerFunnyEnding(task.failEndingId); };
      actionArea.appendChild(failBtn);
    } else {
      const btn = document.createElement('button');
      btn.className = 'action-btn exec-btn';
      btn.textContent = task.actionLabel || '执行';
      btn.onclick = function(){ executeFixed(task); };
      actionArea.appendChild(btn);
    }
  } else if(task.type === 'choice'){
    // Choice buttons
    const choices = typeof task.choices === 'function' ? task.choices(gameState) : task.choices;
    choices.forEach(ch => {
      const btn = document.createElement('button');
      btn.className = 'action-btn choice-btn';
      btn.innerHTML = `<div class="btn-label">${ch.label}</div><div class="btn-desc">${ch.desc}</div>`;
      btn.onclick = function(){ executeChoice(task, ch); };
      actionArea.appendChild(btn);
    });
  } else if(task.type === 'multi-action'){
    // Multiple action buttons
    gameState.multiActionsDone = [];
    task.actions.forEach((act,i) => {
      const btn = document.createElement('button');
      btn.className = 'action-btn';
      btn.id = 'ma-btn-'+i;
      btn.innerHTML = `<div class="btn-label">${act.label}</div>`;
      btn.onclick = function(){ executeMultiAction(task, i); };
      actionArea.appendChild(btn);
    });
  }

  // Check area unlock
  if(task.unlockArea && !gameState.unlockedAreas.includes(task.unlockArea)) {
    gameState.unlockedAreas.push(task.unlockArea);
    unlockAreaOnMap(task.unlockArea);
  }

  // Update map
  setActiveArea(task.location);
  if (task.sceneBg) {
    var bg = document.getElementById('sceneBg');
    bg.style.backgroundImage = 'url(' + task.sceneBg + ')';
    bg.classList.add('show');
  }

  // 音乐触发
  var bombTasks = ['task-13','task-14','task-14b','task-15','task-15-defuse','task-16a','task-16b','task-17'];
  var isBombTask = bombTasks.indexOf(task.id) !== -1;
  if (isBombTask && musicState.current !== 'bomb') {
    crossfadeTo('bomb', 11, true);
  } else if (!isBombTask && musicState.current !== 'bg') {
    switchToBgMusic();
  }
  updateAvatars(task);

  // Scroll to top
  document.getElementById('panelScroll').scrollTop = 0;
}

function executeFixed(task) {
  // Show result
  const r = typeof task.result === 'function' ? task.result(gameState) : task.result;
  showResult(r.text, r.maleReaction);
  // Collect key if any
  collectKeyIfNeeded(task);
  // Disable action buttons
  document.querySelectorAll('#actionArea .action-btn').forEach(b => { b.disabled = true; b.style.opacity = '0.4'; });
}

function executeChoice(task, choice) {
  gameState.choices[task.id] = choice.tag;
  gameState._choiceKeyNum = null; // track key collected by this choice for reset
  showResult(choice.result.text, choice.result.maleReaction);
  // Check choice-level keyPickup first, then task-level
  if(choice.keyPickup) {
    const kp = choice.keyPickup;
    if(!gameState.keysCollected.includes(kp.num)) {
      gameState._choiceKeyNum = kp.num;
      if(kp.type === 'exploration') showKeyDiscoverToast(kp.num, kp.desc);
      else doCollectKey(kp.num, kp.desc);
    }
  } else {
    if(task.keyPickup && !gameState.keysCollected.includes(task.keyPickup.num)) {
      gameState._choiceKeyNum = task.keyPickup.num;
    }
    collectKeyIfNeeded(task);
  }
  // Disable all choice buttons
  document.querySelectorAll('#actionArea .action-btn').forEach(b => { b.disabled = true; b.style.opacity = '0.4'; });
  // Show reset button
  document.getElementById('resetBtn').style.display = 'inline-block';
}

function resetChoice() {
  const task = questChain[gameState.currentTaskIndex];
  if(!task) return;
  // Undo choice
  delete gameState.choices[task.id];
  // Undo key pickup if this choice triggered one
  if(gameState._choiceKeyNum != null) {
    const idx = gameState.keysCollected.indexOf(gameState._choiceKeyNum);
    if(idx > -1) gameState.keysCollected.splice(idx, 1);
    gameState._choiceKeyNum = null;
    updateKeyCounterUI();
    renderKeyMarkers();
  }
  // Hide reset button & re-render task
  document.getElementById('resetBtn').style.display = 'none';
  renderTask();
}

function executeMultiAction(task, index) {
  if(gameState.multiActionsDone.includes(index)) return;
  gameState.multiActionsDone.push(index);
  const act = task.actions[index];

  // Mark done
  const btn = document.getElementById('ma-btn-'+index);
  if(btn){ btn.classList.add('done'); btn.disabled = true; }

  // Highlight the action area briefly
  if(act.area) setActiveArea(act.area);

  // 移动女主头像到指定区域
  if(act.femaleArea) {
    var fDef = avatarDefs['female_'+gameState.femaleId];
    var mDef = avatarDefs['male_'+gameState.maleId];
    var sf = fDef ? fDef.size || 32 : 32;
    var sm = mDef ? mDef.size || 32 : 32;
    var a = areaData[act.femaleArea];
    if(a) {
      var el = document.getElementById('av-female');
      if(el) {
        // 检查男主是否也在同一区域
        var taskData = questChain[gameState.currentTaskIndex];
        var chars = taskData && taskData.characters;
        chars = typeof chars === 'function' ? chars(gameState) : chars;
        var maleInSame = chars && chars.male === act.femaleArea;
        var x = a.left + sf/2 + 4;
        var y = maleInSame ? a.top + a.h/2 - sm/2 - 2 : a.top + a.h/2;
        el.setAttribute('transform','translate('+x+','+y+')');
      }
    }
  }

  // Show result in a mini-result area
  const actionArea = document.getElementById('actionArea');
  const miniResult = document.createElement('div');
  miniResult.style.cssText = 'font-size:12px;color:#999;padding:8px;background:#0a0a12;border-left:2px solid #446;margin:4px 0;border-radius:0 4px 4px 0;animation:fadeIn .3s ease';
  miniResult.textContent = act.result;
  // Insert after the button
  if(btn && btn.nextSibling) actionArea.insertBefore(miniResult, btn.nextSibling);
  else actionArea.appendChild(miniResult);

  // Check if all done
  if(gameState.multiActionsDone.length >= task.actions.length){
    setTimeout(()=>{
      if (!task.keepBgOnSummary) setActiveArea(task.location);
      const r = typeof task.result === 'function' ? task.result(gameState) : task.result;
      showResult(r.text, r.maleReaction);
      collectKeyIfNeeded(task);
    }, 500);
  }
}

function showResult(text, maleReaction) {
  const panel = document.getElementById('resultPanel');
  document.getElementById('resultText').innerHTML = text.replace(/\n/g,'<br>');
  const maleEl = document.getElementById('resultMale');
  if(maleReaction){
    maleEl.innerHTML = maleReaction.replace(/\n/g,'<br>');
    maleEl.style.display = '';
  } else {
    maleEl.style.display = 'none';
  }
  panel.classList.add('show');
  // Scroll result into view
  setTimeout(()=>{ panel.scrollIntoView({behavior:'smooth',block:'nearest'}); }, 100);
}

function collectKeyIfNeeded(task) {
  if(!task.keyPickup || gameState.keysCollected.includes(task.keyPickup.num)) return;
  const kp = task.keyPickup;
  if(kp.type === 'exploration'){
    // Exploration: show "发现" toast with pickup button
    showKeyDiscoverToast(kp.num, kp.desc);
  } else {
    // Mainline: collect immediately
    doCollectKey(kp.num, kp.desc);
  }
}

function doCollectKey(num, desc) {
  if(gameState.keysCollected.includes(num)) return;
  gameState.keysCollected.push(num);
  updateKeyCounterUI();
  const mk = document.getElementById('map-key-'+num);
  if(mk) mk.classList.add('collected');
  showKeyToast(num, desc);
}

function showKeyDiscoverToast(num, desc) {
  const toast = document.getElementById('keyToast');
  toast.innerHTML = `<div class="kt-icon"></div><div class="kt-title">发现金筹码</div><div class="kt-desc">第 ${num} 枚 · ${desc||''}</div><button class="kt-btn" onclick="onPickupKey(${num},'${(desc||'').replace(/'/g,"\\'")}')">取回</button>`;
  const overlay = document.getElementById('keyToastOverlay');
  overlay.classList.add('show');
  overlay.onclick = null; // don't dismiss on background click for discovery
}

function onPickupKey(num, desc) {
  dismissKeyToast();
  if(!gameState.keysCollected.includes(num)) {
    gameState.keysCollected.push(num);
    updateKeyCounterUI();
    const mk = document.getElementById('map-key-'+num);
    if(mk) mk.classList.add('collected');
  }
}

function showKeyToast(num, desc) {
  const toast = document.getElementById('keyToast');
  toast.innerHTML = `<div class="kt-icon"></div><div class="kt-title">取回金筹码</div><div class="kt-desc">第 ${num} 枚 · ${desc||''}</div><div class="kt-count">${gameState.keysCollected.length} / 5</div>`;
  const overlay = document.getElementById('keyToastOverlay');
  overlay.classList.add('show');
  overlay.onclick = dismissKeyToast;
  clearTimeout(window._keyToastTimer);
  window._keyToastTimer = setTimeout(dismissKeyToast, 2000);
}

function dismissKeyToast() {
  clearTimeout(window._keyToastTimer);
  document.getElementById('keyToastOverlay').classList.remove('show');
  document.getElementById('keyToastOverlay').onclick = null;
}

function advanceTask() {
  document.getElementById('resetBtn').style.display = 'none';
  const task = questChain[gameState.currentTaskIndex];
  if(!task) return;
  let nextIdx;
  if(typeof task.next === 'function'){
    nextIdx = task.next(gameState);
  } else {
    nextIdx = task.next;
  }
  if(nextIdx === undefined || nextIdx === null) return;
  // Save snapshot before advancing
  gameState.history.push({
    taskIndex: gameState.currentTaskIndex,
    choices: JSON.parse(JSON.stringify(gameState.choices)),
    keysCollected: [...gameState.keysCollected],
    multiActionsDone: [...gameState.multiActionsDone],
    unlockedAreas: [...gameState.unlockedAreas]
  });
  gameState.currentTaskIndex = nextIdx;
  renderTask();
}

function goBack() {
  if(!gameState.history.length) return;
  const snap = gameState.history.pop();
  gameState.currentTaskIndex = snap.taskIndex;
  gameState.choices = snap.choices;
  gameState.keysCollected = snap.keysCollected;
  gameState.multiActionsDone = snap.multiActionsDone;
  gameState.unlockedAreas = snap.unlockedAreas;
  gameState.phase = 'playing';
  updateKeyCounterUI();
  initMap();
  renderTask();
}

function showEnding() {
  // No need to push history here — advanceTask already saved the snapshot
  gameState.phase = 'ending';
  document.getElementById('taskDisplay').style.display = 'none';

  // Determine ending based on 3 S-level choices
  var s1 = gameState.choices['task-9'];   // A=揭穿 B=沉默
  var s2 = gameState.choices['task-12'];  // A=追问/疼吗 B=坐下/扯平
  var s3 = gameState.choices['task-17'];  // A=撤离 B=迎战

  var endingType = 'tuo'; // default fallback
  if(s1 === 'A' && s2 === 'A' && s3 === 'A') endingType = 'tuo';
  if(s1 === 'A' && s2 === 'A' && s3 === 'B') endingType = 'bing';
  if(s1 === 'A' && s2 === 'B' && s3 === 'A') endingType = 'bei';
  if(s1 === 'A' && s2 === 'B' && s3 === 'B') endingType = 'bing';
  if(s1 === 'B' && s2 === 'A' && s3 === 'A') endingType = 'tuo';
  if(s1 === 'B' && s2 === 'A' && s3 === 'B') endingType = 'bei';
  if(s1 === 'B' && s2 === 'B' && s3 === 'A') endingType = 'sha';
  if(s1 === 'B' && s2 === 'B' && s3 === 'B') endingType = 'sha';

  gameState.endingType = endingType;

  if(endingType === 'sha') {
    showShaEnding();
  } else {
    renderEnding(endingType);
  }
}

function renderEnding(type) {
  var data = endings_he_god[type];

  var endingTrack = {bing:'bing', bei:'bei', sha:'sha', sha_leave:'sha', sha_stay:'sha'};
  if (endingTrack[type]) {
    crossfadeTo(endingTrack[type], 0, false);

// Connection that leads to each lockable area
var areaConnMap = {
  tower:'c-tower-hall', underground:'c-back-underground',
  secret:'c-underground-secret', arena:'c-underground-arena', study:'c-secret-study'
};

function initMap() {
  const combo = gameState.femaleId + '-' + gameState.maleId;
  const exclusive = maleExclusive[gameState.maleId];
  const allExclusives = Object.values(maleExclusive);
  const storyLocked = (progressLock[combo] || []).filter(a => !gameState.unlockedAreas.includes(a));

  // All areas start dim; only active area will be highlighted by setActiveArea
  document.querySelectorAll('.area-rect').forEach(r => {
    r.classList.remove('lit-god','lit-ass','lit-hei','active','locked','story-locked','unlocking');
  });

  // Reset connections
  document.querySelectorAll('.conn').forEach(c => c.classList.remove('lit','conn-exclusive'));

  // Dash connections to other male's exclusive areas
  allExclusives.forEach(area => {
    if (area !== exclusive) {
      var connEl = document.getElementById(areaConnMap[area]);
      if (connEl) connEl.classList.add('conn-exclusive');
    }
  });

  // Render lock icons on connections
  renderLocks(allExclusives, exclusive, storyLocked);

  // render key markers on map
  renderKeyMarkers();
}

function renderLocks(allExclusives, exclusive, storyLocked) {
  var lg = document.getElementById('locksGroup');
  lg.innerHTML = '';
  var ns = 'http://www.w3.org/2000/svg';

  function getConnMid(areaId) {
    var line = document.getElementById(areaConnMap[areaId]);
    if (!line) return null;
    return {
      x: (parseFloat(line.getAttribute('x1')) + parseFloat(line.getAttribute('x2'))) / 2,
      y: (parseFloat(line.getAttribute('y1')) + parseFloat(line.getAttribute('y2'))) / 2
    };
  }

  function addStoryLock(areaId) {
    var m = getConnMid(areaId);
    if (!m) return;
    var g = document.createElementNS(ns, 'g');
    g.setAttribute('id', 'conn-lock-' + areaId);
    g.setAttribute('transform', 'translate(' + m.x + ',' + m.y + ')');

    var bg = document.createElementNS(ns, 'circle');
    bg.setAttribute('r', '9');
    bg.setAttribute('fill', '#12121e');
    bg.setAttribute('stroke', '#454550');
    bg.setAttribute('stroke-width', '1.2');
    g.appendChild(bg);

    var icon = document.createElementNS(ns, 'text');
    icon.setAttribute('text-anchor', 'middle');
    icon.setAttribute('dominant-baseline', 'central');
    icon.setAttribute('font-size', '11');
    icon.setAttribute('pointer-events', 'none');
    icon.textContent = '\u{1F512}';
    g.appendChild(icon);

    lg.appendChild(g);
  }

  function addNoEntry(areaId) {
    var m = getConnMid(areaId);
    if (!m) return;
    var g = document.createElementNS(ns, 'g');
    g.setAttribute('id', 'conn-lock-' + areaId);
    g.setAttribute('transform', 'translate(' + m.x + ',' + m.y + ')');

    var bg = document.createElementNS(ns, 'circle');
    bg.setAttribute('r', '8');
    bg.setAttribute('fill', '#8b2030');
    bg.setAttribute('stroke', '#c04050');
    bg.setAttribute('stroke-width', '1.5');
    g.appendChild(bg);

    var bar = document.createElementNS(ns, 'line');
    bar.setAttribute('x1', '-5'); bar.setAttribute('y1', '0');
    bar.setAttribute('x2', '5');  bar.setAttribute('y2', '0');
    bar.setAttribute('stroke', '#fff');
    bar.setAttribute('stroke-width', '2.5');
    bar.setAttribute('stroke-linecap', 'round');
    g.appendChild(bar);

    lg.appendChild(g);
  }

  // Male-exclusive: red no-entry sign
  allExclusives.forEach(area => {
    if (area !== exclusive) addNoEntry(area);
  });

  // Story-progression locks (grey)
  storyLocked.forEach(area => {
    if (allExclusives.includes(area) && area !== exclusive) return;
    addStoryLock(area);
  });
}

function renderKeyMarkers() {
  const kg = document.getElementById('keysGroup');
  kg.innerHTML = '';
  if (!gameState.femaleId) return;
  const ka = keyArea[gameState.femaleId];
  // Count keys per area for offset
  const areaKeys = {};
  for(let n=1;n<=5;n++){
    const a = ka[n];
    if(!areaKeys[a]) areaKeys[a] = [];
    areaKeys[a].push(n);
  }
  for (let n = 1; n <= 5; n++) {
    const a = ka[n];
    const ad = areaData[a];
    const idx = areaKeys[a].indexOf(n);
    // Position at top-right corner of area, offset downward for multiples
    const kx = ad.left + ad.w - 4;
    const ky = ad.top - 2 + idx * 16;
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('class','map-key' + (gameState.keysCollected.includes(n) ? ' collected' : ''));
    g.setAttribute('id','map-key-' + n);
    g.innerHTML =
      `<text class="map-key-icon" x="${kx}" y="${ky}">🔑</text>`;
    kg.appendChild(g);
  }
}

function unlockAreaOnMap(areaId) {
  const r = document.getElementById('r-' + areaId);
  if(r) {
    r.classList.add('unlocking');
    setTimeout(()=> r.classList.remove('unlocking'), 800);
  }
  // Remove connection lock
  var lockG = document.getElementById('conn-lock-' + areaId);
  if(lockG) lockG.remove();
  // Show unlock toast
  const label = areaData[areaId] ? areaData[areaId].label : areaId;
  showUnlockToast(label);
}

function showUnlockToast(areaLabel) {
  let toast = document.getElementById('unlockToast');
  if(!toast) {
    toast = document.createElement('div');
    toast.id = 'unlockToast';
    toast.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#1a1508;border:1px solid #d4af37;color:#d4af37;padding:8px 24px;border-radius:4px;font-size:13px;z-index:90;opacity:0;transition:opacity .3s;pointer-events:none';
    document.body.appendChild(toast);
  }
  toast.textContent = areaLabel + ' 已解锁';
  toast.style.opacity = '1';
  clearTimeout(window._unlockToastTimer);
  window._unlockToastTimer = setTimeout(()=>{ toast.style.opacity = '0'; }, 2000);
}

function setActiveArea(areaId) {
  document.querySelectorAll('.area-rect.active').forEach(r => r.classList.remove('active'));
  if (areaId) {
    const el = document.getElementById('r-' + areaId);
    if (el) el.classList.add('active');
  }
  updateSceneBg(areaId);
}

// ── 多轨音乐系统 ──
var musicTracks = {
  bg:   'music/背景.mp3',
  bomb: 'music/炸弹危机.mp3',
  bing: 'music/结局-并肩.mp3',
  bei:  'music/结局-悲歌.mp3',
  sha:  'music/结局-陌路&念念不忘.mp3'
};
var musicState = {
  current: null,       // 'bg','bomb','bing','bei','sha' or null
  active: 'A',         // which audio element is active: 'A' or 'B'
  muted: false,
  volume: 100,
  fading: false
};

function getActiveAudio()  { return document.getElementById('audio' + musicState.active); }
function getInactiveAudio(){ return document.getElementById(musicState.active === 'A' ? 'audioB' : 'audioA'); }

function playMusic() {
  var audio = document.getElementById('audioA');
  audio.src = musicTracks.bg;
  audio.loop = true;
  audio.volume = musicState.volume / 100;
  musicState.current = 'bg';
  musicState.active = 'A';
  musicState.fading = false;
  audio._loopHandler = null;
  var btn = document.getElementById('musicBtn');
  var ctrl = document.getElementById('musicCtrl');
  audio.play().then(function() {
    ctrl.style.display = 'flex';
    btn.textContent = '🔊';
    btn.classList.add('playing');
  }).catch(function() {
    ctrl.style.display = 'flex';
    btn.textContent = '🔇';
    btn.classList.remove('playing');
  });
}

function toggleMusic() {
  var btn = document.getElementById('musicBtn');
  if (musicState.muted) {
    musicState.muted = false;
    var a = getActiveAudio();
    a.volume = musicState.volume / 100;
    a.play().catch(function(){});
    btn.textContent = '🔊';
    btn.classList.add('playing');
  } else {
    musicState.muted = true;
    getActiveAudio().pause();
    btn.textContent = '🔇';
    btn.classList.remove('playing');
  }
}

function setVolume(val) {
  musicState.volume = val;
  if (!musicState.muted) {
    getActiveAudio().volume = val / 100;
  }
}

function crossfadeTo(trackKey, startTime, loop) {
  if (musicState.fading) return;
  if (musicState.current === trackKey) return;
  var src = musicTracks[trackKey];
  if (!src) return;

  var fadeMs = 1500;
  var steps = 30;
  var interval = fadeMs / steps;
  var targetVol = musicState.volume / 100;

  var oldAudio = getActiveAudio();
  var newAudio = getInactiveAudio();

  // 清除旧的自定义循环监听
  if (oldAudio._loopHandler) {
    oldAudio.removeEventListener('ended', oldAudio._loopHandler);
    oldAudio._loopHandler = null;
  }

  // Prepare new track
  newAudio.src = src;
  newAudio.loop = false;
  newAudio.volume = 0;
  newAudio.load();

  // 设置自定义循环
  if (newAudio._loopHandler) {
    newAudio.removeEventListener('ended', newAudio._loopHandler);
  }
  if (loop !== false) {
    var loopStart = startTime || 0;
    newAudio._loopHandler = function() {
      newAudio.currentTime = loopStart;
      newAudio.play().catch(function(){});
    };
    newAudio.addEventListener('ended', newAudio._loopHandler);
  } else {
    newAudio._loopHandler = null;
  }

  musicState.fading = true;
  musicState.current = trackKey;

  if (musicState.muted) {
    // Just swap, don't actually play
    oldAudio.pause();
    oldAudio.src = '';
    musicState.active = musicState.active === 'A' ? 'B' : 'A';
    musicState.fading = false;
    return;
  }

  // 等待新音频可播放后开始交叉淡入淡出
  function startCrossfade() {
    if (startTime) newAudio.currentTime = startTime;
    newAudio.play().catch(function(){});

    var oldVol = oldAudio.volume;
    var step = 0;

    var timer = setInterval(function() {
      step++;
      var progress = step / steps;
      oldAudio.volume = Math.max(0, oldVol * (1 - progress));
      newAudio.volume = Math.min(targetVol, targetVol * progress);

      if (step >= steps) {
        clearInterval(timer);
        oldAudio.pause();
        oldAudio.src = '';
        oldAudio.volume = 0;
        if (oldAudio._loopHandler) {
          oldAudio.removeEventListener('ended', oldAudio._loopHandler);
          oldAudio._loopHandler = null;
        }
        newAudio.volume = targetVol;
        musicState.active = musicState.active === 'A' ? 'B' : 'A';
        musicState.fading = false;
        var btn = document.getElementById('musicBtn');
        btn.textContent = '🔊';
        btn.classList.add('playing');
      }
    }, interval);
  }

  // 如果已有足够数据直接开始，否则等 canplay
  if (newAudio.readyState >= 3) {
    startCrossfade();
  } else {
    newAudio.addEventListener('canplay', function onCanPlay() {
      newAudio.removeEventListener('canplay', onCanPlay);
      startCrossfade();
    });
  }
}

function switchToBgMusic() {
  crossfadeTo('bg', 0, true);
}

function fadeOutMusic() {
  if (musicState.muted) return;
  var audio = getActiveAudio();
  var startVol = audio.volume;
  var steps = 20;
  var step = 0;
  var timer = setInterval(function() {
    step++;
    audio.volume = Math.max(0, startVol * (1 - step / steps));
    if (step >= steps) {
      clearInterval(timer);
      audio.pause();
      audio.volume = 0;
      musicState.current = null;
    }
  }, 50);
}

function stopMusic() {
  var a = document.getElementById('audioA');
  var b = document.getElementById('audioB');
  if (a._loopHandler) { a.removeEventListener('ended', a._loopHandler); a._loopHandler = null; }
  if (b._loopHandler) { b.removeEventListener('ended', b._loopHandler); b._loopHandler = null; }
  a.pause(); a.src = '';
  b.pause(); b.src = '';
  musicState.current = null;
  musicState.active = 'A';
  musicState.fading = false;
}
