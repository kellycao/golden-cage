<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金笼 - 交互式故事流程图</title>
<style>
/* ═══ Step 6: 全局样式 + 身份选择器 + 图例 ═══ */

/* -- 重置 & 主题 -- */
*{ margin:0; padding:0; box-sizing:border-box; }
body{
  background:#0a0a0f; color:#ccc;
  font-family:'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif;
  line-height:1.6; padding:20px 20px 60px;
}
::selection{ background:#d4af3740; }

/* -- 标题 -- */
#pageTitle{
  text-align:center; font-size:2.4rem; letter-spacing:.6em;
  color:#d4af37; margin:20px 0 4px;
  text-shadow:0 0 20px #d4af3740;
}
.sub{
  text-align:center; font-size:.85rem; color:#666;
  margin-bottom:28px; letter-spacing:.05em;
}

/* -- 身份选择器 -- */
.combo-selector{
  max-width:720px; margin:0 auto 20px;
  background:#111118; border:1px solid #222; border-radius:10px;
  padding:16px 20px; display:flex; flex-wrap:wrap;
  align-items:center; gap:12px;
}
.sel-group{ display:flex; align-items:center; gap:6px; }
.sel-label{
  font-size:.8rem; color:#666; margin-right:4px;
  min-width:2.5em; text-align:right;
}
.sel-btn{
  background:#1a1a22; border:1px solid #333; border-radius:6px;
  color:#999; padding:5px 14px; font-size:.85rem;
  cursor:pointer; transition:all .2s;
}
.sel-btn:hover{ border-color:#555; color:#ccc; }
.sel-btn.active{ border-color:#d4af37; color:#d4af37; background:#1a1810; }
.combo-info{
  margin-left:auto; display:flex; align-items:center; gap:10px;
}
.combo-label{ font-size:.8rem; color:#666; }
.clear-btn{
  background:none; border:1px solid #444; border-radius:4px;
  color:#888; padding:3px 10px; font-size:.75rem;
  cursor:pointer; transition:all .2s;
}
.clear-btn:hover{ border-color:#d4af37; color:#d4af37; }

/* -- 图例 -- */
.legend{
  max-width:720px; margin:0 auto 24px;
  display:flex; flex-wrap:wrap; gap:16px;
  justify-content:center;
}
.legend-item{
  display:flex; align-items:center; gap:5px;
  font-size:.75rem; color:#666;
}
.legend-swatch{
  width:14px; height:14px; border-radius:3px;
  border:1.5px solid #333; display:inline-block;
}
.legend-line{
  width:24px; height:0; display:inline-block;
  border-top:2px solid #333;
}
.legend-line.dashed{ border-top-style:dashed; }
.legend-line.fail{ border-color:#884040; }
.legend-line.branch-a{ border-color:#e0c080; }
.legend-line.branch-b{ border-color:#80b0e0; }

/* -- 分隔线 -- */
.divider{
  border:none; border-top:1px solid #222;
  max-width:900px; margin:40px auto;
}

/* -- 流程图容器 -- */
.chart-wrap{
  position:relative; max-width:1600px; margin:0 auto;
  overflow:visible;
}
#chart{ display:block; width:100%; }

/* ═══ Step 7: SVG 节点样式 ═══ */

/* -- 节点组 -- */
.node{ cursor:pointer; }
.node:hover .node-bg{ filter:brightness(1.3); }
.node:hover .node-title{ fill:#fff; }

/* -- 节点背景矩形（由 JS 设置 fill/stroke/stroke-width） -- */
.node-bg{
  rx:6; ry:6;
  transition:filter .2s, opacity .3s;
}

/* -- S级发光 -- */
.node.grade-S .node-bg{
  filter:drop-shadow(0 0 6px #d4af3760);
}
.node.grade-S:hover .node-bg{
  filter:drop-shadow(0 0 10px #d4af3780) brightness(1.3);
}

/* -- 节点标题文字 -- */
.node-title{
  font-size:13px; font-weight:600;
  fill:#ccc; text-anchor:middle;
  pointer-events:none;
  transition:fill .2s;
}

/* -- 节点副标签（等级+类型） -- */
.node-tag{
  font-size:10px; fill:#666;
  text-anchor:middle; pointer-events:none;
}

/* -- 金筹码标记 -- */
.node-chip{
  font-size:11px; fill:#d4af37;
  text-anchor:start; pointer-events:none;
}

/* -- 场景标签 -- */
.node-location{
  font-size:9px; fill:#555;
  text-anchor:middle; pointer-events:none;
}

/* -- 条件标签（仅掉包线等） -- */
.node-condition{
  font-size:9px; fill:#887750;
  font-style:italic; text-anchor:middle;
  pointer-events:none;
}

/* -- 展开提示箭头 -- */
.node-expand-hint{
  font-size:25px; fill:#555;
  text-anchor:end; dominant-baseline:hanging;
  pointer-events:none;
  transition:fill .2s;
}
.node:hover .node-expand-hint{ fill:#999; }

/* -- 幕标题 -- */
.act-label{
  font-size:15px; font-weight:700;
  fill:#444; text-anchor:middle;
  letter-spacing:.2em;
}
.act-divider{
  stroke:#222; stroke-width:1;
  stroke-dasharray:6,4;
}

/* -- 结局节点 -- */
.node.type-ending .node-bg{ rx:12; ry:12; }
.node.type-ending .node-title{ font-size:14px; font-weight:700; }

/* -- 搞笑结局节点 -- */
.node.funny .node-bg{
  stroke:#884040; stroke-dasharray:4,3;
  fill:#1a1010;
}
.node.funny .node-title{ fill:#aa6060; font-size:11px; }

/* -- 选择子节点 -- */
.choice-node{ cursor:pointer; }
.choice-node:hover .choice-node-bg{ filter:brightness(1.3); }
.choice-node .choice-node-bg{
  rx:5; ry:5; fill:#0e0e14;
  stroke-width:1.5;
  transition:filter .2s, opacity .3s;
}
.choice-node.tag-a .choice-node-bg{ stroke:#e0c080; }
.choice-node.tag-b .choice-node-bg{ stroke:#80b0e0; }
.choice-node .choice-node-title{
  font-size:11px; font-weight:600;
  text-anchor:middle; pointer-events:none;
}
.choice-node.tag-a .choice-node-title{ fill:#e0c080; }
.choice-node.tag-b .choice-node-title{ fill:#80b0e0; }
.choice-node .choice-node-desc{
  font-size:9px; fill:#666;
  text-anchor:middle; pointer-events:none;
}
.choice-node.dimmed{ opacity:0.35; pointer-events:none; }
.choice-node.selected .choice-node-bg{
  stroke:#d4af37 !important;
  stroke-width:2.5 !important;
  filter:drop-shadow(0 0 8px #d4af3780);
}

/* -- 选中态（点击展开详情） -- */
.node.selected .node-bg{
  stroke:#d4af37 !important;
  stroke-width:2.5 !important;
  filter:drop-shadow(0 0 8px #d4af3780);
}

/* -- 高亮/暗淡态（身份筛选） -- */
.node.dimmed{ opacity:0.35; }
.node.highlighted .node-bg{ filter:brightness(1.15); }
/* ═══ Step 8: 连线 + 详情面板 + 高亮 + 响应式 ═══ */

/* -- 连线 -- */
.edge{ fill:none; stroke:#333; stroke-width:1.5; }
.edge.main{ stroke:#444; }
.edge.branch-a{ stroke:#e0c080; stroke-dasharray:6,3; }
.edge.branch-b{ stroke:#80b0e0; stroke-dasharray:6,3; }
.edge.fail{ stroke:#884040; stroke-dasharray:4,3; stroke-width:1; }
.edge.dimmed{ opacity:0.1; }
.edge.highlighted{ stroke:#d4af37; stroke-width:2.5; opacity:1; }
.edge-group.dimmed{ opacity:0.15; }
.edge-group.highlighted{ opacity:1; }

/* -- 连线箭头 -- */
.arrow-main{ fill:#444; }
.arrow-branch-a{ fill:#e0c080; }
.arrow-branch-b{ fill:#80b0e0; }
.arrow-fail{ fill:#884040; }

/* -- 连线标签 -- */
.edge-label{
  font-size:9px; fill:#555;
  text-anchor:middle; pointer-events:none;
}
.edge-label.branch-a{ fill:#e0c080; }
.edge-label.branch-b{ fill:#80b0e0; }

/* -- 详情面板 -- */
.detail-panel{
  position:absolute; z-index:100;
  background:#111118; border:1px solid #2a2a35;
  border-radius:8px; padding:16px 18px;
  width:340px; max-height:480px; overflow-y:auto;
  box-shadow:0 4px 24px rgba(0,0,0,.6);
  font-size:.82rem; line-height:1.6;
  color:#bbb;
  animation:panelFadeIn .2s ease-out;
}
@keyframes panelFadeIn{
  from{ opacity:0; transform:translateY(-8px); }
  to{ opacity:1; transform:translateY(0); }
}
.detail-panel .dp-header{
  display:flex; align-items:center; gap:8px;
  margin-bottom:10px; padding-bottom:8px;
  border-bottom:1px solid #222;
}
.detail-panel .dp-title{
  font-size:1rem; font-weight:700; color:#ddd;
}
.detail-panel .dp-grade{
  font-size:.7rem; padding:2px 6px;
  border-radius:3px; font-weight:600;
}
.detail-panel .dp-grade.S{ background:#d4af3720; color:#d4af37; }
.detail-panel .dp-grade.A{ background:#e0a03020; color:#e0a030; }
.detail-panel .dp-grade.B{ background:#66666620; color:#888; }
.detail-panel .dp-category{
  font-size:.7rem; padding:2px 6px;
  border-radius:3px;
}
.detail-panel .dp-category.career{ background:#8090c020; color:#8090c0; }
.detail-panel .dp-category.emotion{ background:#c090b020; color:#c090b0; }

.detail-panel .dp-section{
  margin-top:10px;
}
.detail-panel .dp-label{
  font-size:.72rem; color:#555; font-weight:600;
  text-transform:uppercase; letter-spacing:.08em;
  margin-bottom:3px;
}
.detail-panel .dp-text{
  color:#aaa; white-space:pre-line;
}
.detail-panel .dp-text.result{ color:#99aa88; }

/* -- 详情面板：选择分支 -- */
.detail-panel .dp-choices{
  display:flex; flex-direction:column; gap:6px;
  margin-top:4px;
}
.detail-panel .dp-choice{
  background:#0e0e16; border:1px solid #252530;
  border-radius:5px; padding:6px 10px;
}
.detail-panel .dp-choice-label{
  font-weight:600; color:#ccc; font-size:.8rem;
}
.detail-panel .dp-choice-label .tag-a{ color:#e0c080; }
.detail-panel .dp-choice-label .tag-b{ color:#80b0e0; }
.detail-panel .dp-choice-desc{
  font-size:.75rem; color:#777; margin-top:2px;
}

/* -- 详情面板：男主反应 -- */
.detail-panel .dp-reactions{
  display:grid; grid-template-columns:1fr 1fr 1fr;
  gap:6px; margin-top:4px;
}
.detail-panel .dp-reaction{
  background:#0e0e16; border:1px solid #252530;
  border-radius:4px; padding:5px 8px;
  font-size:.72rem; color:#888;
}
.detail-panel .dp-reaction .dp-r-name{
  font-weight:600; font-size:.68rem; margin-bottom:2px;
}
.detail-panel .dp-reaction.active{
  border-color:#d4af3760; background:#14120e;
}
.detail-panel .dp-reaction.active .dp-r-name{ color:#d4af37; }
.detail-panel .dp-reaction.active .dp-r-text{ color:#bbb; }

/* -- 详情面板：多步骤 -- */
.detail-panel .dp-steps{
  display:flex; flex-direction:column; gap:4px;
  margin-top:4px;
}
.detail-panel .dp-step{
  display:flex; gap:6px; font-size:.75rem;
}
.detail-panel .dp-step-num{
  color:#555; font-weight:600; min-width:1.2em;
}
.detail-panel .dp-step-label{ color:#aaa; font-weight:600; }
.detail-panel .dp-step-result{ color:#777; }

/* -- 详情面板关闭按钮 -- */
.detail-panel .dp-close{
  position:absolute; top:8px; right:10px;
  background:none; border:none; color:#555;
  font-size:1.1rem; cursor:pointer; line-height:1;
}
.detail-panel .dp-close:hover{ color:#d4af37; }

/* -- 详情面板：金筹码备注 -- */
.detail-panel .dp-chip-note{
  margin-top:8px; padding:6px 10px;
  background:#1a180e; border:1px solid #2a2510;
  border-radius:4px; font-size:.72rem; color:#c0a050;
}

/* -- 响应式 -- */
@media(max-width:768px){
  body{ padding:12px 8px 40px; }
  #pageTitle{ font-size:1.8rem; letter-spacing:.3em; }
  .sub{ font-size:.75rem; }
  .combo-selector{
    flex-direction:column; align-items:stretch;
    padding:12px;
  }
  .combo-info{ margin-left:0; margin-top:6px; }
  .legend{ gap:10px; }
  .detail-panel{
    width:280px; padding:12px 14px;
    font-size:.78rem;
  }
  .detail-panel .dp-reactions{
    grid-template-columns:1fr;
  }
}
@media(max-width:480px){
  #pageTitle{ font-size:1.4rem; }
  .detail-panel{ width:240px; max-height:360px; }
  .sel-btn{ padding:4px 10px; font-size:.78rem; }
}
/* ═══ Step 14: 下方表格样式 ═══ */
</style>
</head>

// 布局常量
var NODE_W = 160, NODE_H = 52;
var CHOICE_W = 140, CHOICE_H = 38; // 选择子节点尺寸
var GAP_X = 40, GAP_Y = 32;

var PAD_TOP = 30, PAD_BOTTOM = 40;

var layoutData = {}; // id → { x, y, w, h }

function computeLayout() {
  layoutData = {};
  actYStarts = {};

  // 找出某个任务的选择子节点
  function choicesFor(taskId) {
    var out = [];
    for (var i = 0; i < CHOICE_NODES.length; i++) {
      if (CHOICE_NODES[i].parentId === taskId) out.push(CHOICE_NODES[i]);
    }
    return out;
  }

  // 手动行定义：每行是标题或节点列表
  // choice 行在对应任务行后自动插入
  var rawRows = [
    // ── 第一幕 · 三女主并行 ──
    // 杀手 col=-2, 赌神 col=0, 千金 col=2
    { act:1, header:'第一幕 · 身份危机' },
    { nodes:[
      { id:'ass-1', col:-2 }, { id:'task-0', col:0 }, { id:'hei-1', col:2 },
      { id:'funny-2', col:-2.85, funny:true }, { id:'funny-4', col:2.85, funny:true }
    ]},
    { nodes:[
      { id:'ass-2', col:-2 }, { id:'task-1', col:0 }, { id:'hei-2', col:2 },
      { id:'funny-2b', col:-2.85, funny:true }
    ], choiceRow:true },
    { nodes:[
      { id:'ass-3', col:-2 }, { id:'task-2', col:0 }, { id:'hei-3', col:2 },
      { id:'funny-4b', col:2.85, funny:true }
    ], choiceRow:true },
    { nodes:[
      { id:'ass-4', col:-2 }, { id:'task-3', col:0 }, { id:'hei-4', col:2 },
      { id:'funny-1', col:0.8, funny:true }
    ], choiceRow:true },
    // 赌神专属
    { nodes:[{ id:'task-3-1', col:0.4 }] },
    { nodes:[{ id:'task-4', col:0 }], choiceRow:true },
    // ── 第二幕 · 共享脊柱 + 男主分叉 ──
    { act:2, header:'第二幕 · 锦标赛 + 炸弹' },
    { nodes:[{ id:'task-5', col:0 }] },
    { nodes:[{ id:'task-6', col:0 }], choiceRow:true },
    // 男主情感分叉（金筹码②后）: 荷官 col=-1, 老板 col=0, 打手 col=1
    { nodes:[
      { id:'he-emo1', col:-1.5 }, { id:'ban-emo1', col:0 }, { id:'sho-emo1', col:1.5 }
    ], choiceRow:true },
    { nodes:[{ id:'task-7', col:0 }] },
    // 男主备赛分叉
    { nodes:[
      { id:'task-8', col:-1.5 }, { id:'ban-emo2', col:0 }, { id:'sho-emo2', col:1.5 }
    ], choiceRow:true },
    // S1 共享
    { nodes:[{ id:'task-9', col:0 }], choiceRow:true },
    { nodes:[{ id:'task-10', col:0 }] },
    // 男主S2分叉
    { nodes:[
      { id:'task-11', col:-1.5 }, { id:'ban-s2', col:0 }, { id:'sho-s2', col:1.5 }
    ], choiceRow:true },
    { nodes:[{ id:'task-12', col:-1.5 }], choiceRow:true },
    // ── 第三幕 ──
    { act:3, header:'第三幕 · 围剿' },
    { nodes:[{ id:'task-13', col:0 }, { id:'funny-3', col:-1.2, funny:true }] },
    { nodes:[{ id:'task-14', col:0 }] },
    { nodes:[{ id:'task-14b', col:0 }] },
    { nodes:[{ id:'task-15', col:0 }], choiceRow:true },
    { nodes:[{ id:'task-15-defuse', col:0.5 }, { id:'funny-5', col:-1.2, funny:true }] },
    { nodes:[{ id:'task-16a', col:0 }] },
    { nodes:[{ id:'task-16b', col:0 }] },
    // 男主S3分叉
    { nodes:[
      { id:'task-17', col:-1.5 }, { id:'ban-s3', col:0 }, { id:'sho-s3', col:1.5 }
    ], choiceRow:true },
    // ── 结局 ──
    { act:0, header:'结局' },
    { nodes:[
      { id:'end-shoulder', col:-1.5, ending:true },
      { id:'end-elegy',    col:-0.5, ending:true },
      { id:'end-escape',   col:0.5,  ending:true },
      { id:'end-stranger', col:1.5,  ending:true }
    ]}
  ];

  var centerX = SVG_W / 2;
  var colUnit = NODE_W + GAP_X; // 列间距单位
  var y = PAD_TOP;

  for (var r = 0; r < rawRows.length; r++) {
    var row = rawRows[r];

    // 幕标题行
    if (row.header) {
      if (row.act) actYStarts[row.act] = y;
      layoutData['__act_' + (row.act || 'end')] = {
        x: centerX, y: y + 18,
        label: row.header, dividerY: y
      };
      y += ACT_HEADER_H;
      continue;
    }

    // 节点行
    if (row.nodes) {
      for (var n = 0; n < row.nodes.length; n++) {
        var nd = row.nodes[n];
        var w = NODE_W;
        var h = NODE_H;
        if (nd.funny) { w = 130; h = 38; }
        if (nd.ending) { w = 150; h = 60; }

        var nx = centerX + nd.col * colUnit - w / 2;
        layoutData[nd.id] = {
          x: nx, y: y, w: w, h: h,
          funny: !!nd.funny, ending: !!nd.ending
        };
      }
      y += NODE_H + GAP_Y;

      // 选择子节点行
      if (row.choiceRow) {
        var anyChoicePlaced = false;
        // 收集该行所有任务节点（排除funny/ending）
        for (var tn = 0; tn < row.nodes.length; tn++) {
          var tnd = row.nodes[tn];
          if (tnd.funny || tnd.ending) continue;
          var chs = choicesFor(tnd.id);
          if (chs.length === 0) continue;
          anyChoicePlaced = true;
          // 选择节点围绕其父节点的 col 展开
          var parentCol = tnd.col;
          var choiceSpread = 0.37; // 两个选择 offset ±0.37
          var offsets;
          if (chs.length === 2) offsets = [-choiceSpread, choiceSpread];
          else if (chs.length === 4) offsets = [-1.5, -0.5, 0.5, 1.5];
          else {
            offsets = [];
            var half = (chs.length - 1) / 2;
            for (var ci = 0; ci < chs.length; ci++) offsets.push(ci - half);
          }
          for (var ci2 = 0; ci2 < chs.length; ci2++) {
            var cNode = chs[ci2];
            var cx = centerX + (parentCol + offsets[ci2]) * colUnit - CHOICE_W / 2;
            layoutData[cNode.id] = {
              x: cx, y: y, w: CHOICE_W, h: CHOICE_H,
              isChoice: true
            };
          }
        }
        if (anyChoicePlaced) {
          y += CHOICE_H + GAP_Y;
        }
      }
    }
  }

  // ending 主节点（不渲染，仅用于连线目标）
  layoutData['ending'] = {
    x: centerX - NODE_W / 2,
    y: layoutData['end-shoulder'] ? layoutData['end-shoulder'].y : y,
    w: NODE_W, h: NODE_H, hidden: true
  };

  svgHeight = y + PAD_BOTTOM;
}

var SVG_NS = 'http://www.w3.org/2000/svg';

function svgEl(tag, attrs) {
  var el = document.createElementNS(SVG_NS, tag);
  if (attrs) {
    for (var k in attrs) {
      if (attrs.hasOwnProperty(k)) el.setAttribute(k, attrs[k]);
    }
  }
  return el;
}

function renderChart() {
  var svg = document.getElementById('chart');
  svg.innerHTML = '';
  svg.setAttribute('viewBox', '0 0 ' + SVG_W + ' ' + svgHeight);

  // ── 1. 幕标题 & 分隔线 ──
  var actKeys = ['__act_1', '__act_2', '__act_3', '__act_end'];
  for (var a = 0; a < actKeys.length; a++) {
    var ad = layoutData[actKeys[a]];
    if (!ad) continue;

    // 分隔虚线
    if (actKeys[a] !== '__act_1') {
      svg.appendChild(svgEl('line', {
        x1: 80, y1: ad.dividerY - 6,
        x2: SVG_W - 80, y2: ad.dividerY - 6,
        'class': 'act-divider'
      }));
    }

    // 标题文字
    var txt = svgEl('text', {
      x: ad.x, y: ad.y,
      'class': 'act-label'
    });
    txt.textContent = ad.label;
    svg.appendChild(txt);
  }

  // ── 2. 搞笑结局节点 ──
  for (var f = 0; f < FUNNY_NODES.length; f++) {
    var fn = FUNNY_NODES[f];
    var fl = layoutData[fn.id];
    if (!fl) continue;
    renderFunnyNode(svg, fn, fl);
  }

  // ── 3. 结局子节点 ──
  for (var e = 0; e < ENDING_NODES.length; e++) {
    var en = ENDING_NODES[e];
    var el = layoutData[en.id];
    if (!el) continue;
    renderEndingNode(svg, en, el);
  }

  // ── 4. 任务节点 ──
  for (var i = 0; i < TASKS.length; i++) {
    var task = TASKS[i];
    var tl = layoutData[task.id];
    if (!tl || tl.hidden) continue;
    if (task.type === 'ending') continue;
    renderTaskNode(svg, task, tl);
  }

  // ── 5. 选择子节点 ──
  for (var ci = 0; ci < CHOICE_NODES.length; ci++) {
    var cn = CHOICE_NODES[ci];
    var cl = layoutData[cn.id];
    if (!cl) continue;
    renderChoiceNode(svg, cn, cl);
  }
}

function renderTaskNode(svg, task, tl) {
  var g = svgEl('g', {
    'class': 'node grade-' + task.grade + ' type-' + task.type,
    'data-id': task.id,
    transform: 'translate(' + tl.x + ',' + tl.y + ')'
  });

  // 等级和类型样式
  var grade = GRADES[task.grade] || GRADES.B;
  var cat = CATEGORIES[task.category] || CATEGORIES['事业'];

  // 背景矩形
  g.appendChild(svgEl('rect', {
    'class': 'node-bg',
    x: 0, y: 0,
    width: tl.w, height: tl.h,
    fill: cat.fill,
    stroke: grade.border,
    'stroke-width': grade.borderW
  }));

  // 标题
  var title = svgEl('text', {
    'class': 'node-title',
    x: tl.w / 2, y: 22,
    fill: grade.titleColor
  });
  title.textContent = task.title;
  g.appendChild(title);

  // 副标签：等级 · 类型 · 场景
  var loc = LOCATIONS[task.location];
  var tagText = task.grade + ' · ' + task.category;
  if (loc) tagText += ' · ' + loc.name;
  var tag = svgEl('text', {
    'class': 'node-tag',
    x: tl.w / 2, y: 38
  });
  tag.textContent = tagText;
  g.appendChild(tag);

  // S级选择点标记
  if (task.sChoice) {
    var sLabel = svgEl('text', {
      'class': 'node-chip',
      x: 4, y: 13
    });
    sLabel.textContent = '⭐';
    g.appendChild(sLabel);
  }

  // 金筹码标记
  if (task.chipNum) {
    var chip = svgEl('text', {
      'class': 'node-chip',
      x: tl.w - 30, y: tl.h - 6
    });
    chip.textContent = '🔑' + task.chipNum;
    g.appendChild(chip);
  }

  // 条件标签（仅掉包线等）
  if (task.onlyIf) {
    var cond = svgEl('text', {
      'class': 'node-condition',
      x: tl.w / 2, y: -6
    });
    cond.textContent = '仅 ' + task.onlyIf.replace('=', '选');
    g.appendChild(cond);
  }

  // 解锁标记
  if (task.unlocks) {
    var unlockLoc = LOCATIONS[task.unlocks];
    if (unlockLoc) {
      var ul = svgEl('text', {
        x: tl.w / 2, y: tl.h + 14,
        'font-size': '9px', fill: '#557755',
        'text-anchor': 'middle', 'pointer-events': 'none'
      });
      ul.textContent = '🔓 ' + unlockLoc.name;
      g.appendChild(ul);
    }
  }

  // 展开提示箭头
  var expandHint = svgEl('text', {
    'class': 'node-expand-hint',
    x: tl.w - 4, y: 4
  });
  expandHint.textContent = '\u25b8';
  g.appendChild(expandHint);

  // 点击事件
  g.addEventListener('click', function() {
    onNodeClick(task.id);
  });

  svg.appendChild(g);
}

function renderChoiceNode(svg, cn, cl) {
  var isA = cn.tag === 'A' || cn.tag === 'revealA' || cn.tag === 'silentA';

  var out = [];
  for (var i = 0; i < CHOICE_NODES.length; i++) {
    if (CHOICE_NODES[i].parentId === taskId) out.push(CHOICE_NODES[i]);
  }
  return out;
}

// 根据源/目标任务的身份属性，生成连线标签（如"荷官线"）
function getIdentityLabel(fromTask, toId) {
  var toTask = TASK_MAP[toId];
  if (!toTask) return null;
  var labels = [];
  // 男主分支标注
  if (toTask.forMale !== 'all' && (!fromTask || fromTask.forMale === 'all')) {
    var m = MALES[toTask.forMale];
    if (m) labels.push(m.name + '线');
  }
  // 女主分支标注
  if (toTask.forFemale !== 'all' && (!fromTask || fromTask.forFemale === 'all')) {
    var f = FEMALES[toTask.forFemale];
    if (f) labels.push(f.name + '线');
  }
  return labels.length > 0 ? labels.join(' · ') : null;
}

function renderEdges() {
  var svg = document.getElementById('chart');
  allEdges = [];

  for (var i = 0; i < TASKS.length; i++) {
    var task = TASKS[i];
    if (task.type === 'ending') continue;
    var from = layoutData[task.id];
    if (!from || from.hidden) continue;

    var cns = getChoiceNodesFor(task.id);

    // ── 选择型任务：task → 选择节点 → next ──
    if (cns.length > 0) {
      // task → 每个选择节点
      for (var c = 0; c < cns.length; c++) {
        var cn = cns[c];
        var cLayout = layoutData[cn.id];
        if (!cLayout) continue;
        var isA = cn.tag === 'A' || cn.tag === 'revealA' || cn.tag === 'silentA';
        var edgeType = isA ? 'branch-a' : 'branch-b';
        var e1 = drawEdge(svg, from, cLayout, edgeType, null);
        allEdges.push({ from:task.id, to:cn.id, type:edgeType, el:e1 });
      }

      // 每个选择节点 → next（可能多个目标，只连有布局的）
      if (task.next) {
        for (var ni = 0; ni < task.next.length; ni++) {
          var nextId = task.next[ni];
          if (nextId === 'ending') {
            for (var c2 = 0; c2 < cns.length; c2++) {
              var cl2 = layoutData[cns[c2].id];
              if (cl2) drawEndingEdges(svg, cns[c2].id, cl2);
            }
          } else {
            var toLayout = layoutData[nextId];
            if (toLayout && !toLayout.hidden) {
              var idLabel = getIdentityLabel(task, nextId);
              for (var c3 = 0; c3 < cns.length; c3++) {
                var cl3 = layoutData[cns[c3].id];
                if (!cl3) continue;
                var e2 = drawEdge(svg, cl3, toLayout, 'main', idLabel);
                allEdges.push({ from:cns[c3].id, to:nextId, type:'main', label:idLabel, el:e2 });
              }
            }
          }
        }
      }

      // 分支连线（如 task-3 → task-3-1）仍从任务节点出发
      if (task.branches) {
        for (var b = 0; b < task.branches.length; b++) {
          var br = task.branches[b];
          var bTo = layoutData[br.target];
          if (!bTo) continue;
          var bIsA = br.condition && br.condition.indexOf('=A') > -1;
          var bType = bIsA ? 'branch-a' : 'branch-b';
          var e3 = drawEdge(svg, from, bTo, bType, br.label);
          allEdges.push({ from:task.id, to:br.target, type:bType, label:br.label, el:e3 });
        }
      }
    } else {
      // ── 非选择型任务：直接 task → next ──
      var branchTargets = {};
      if (task.branches) {
        for (var b2 = 0; b2 < task.branches.length; b2++) {
          branchTargets[task.branches[b2].target] = task.branches[b2];
        }
      }

      if (task.next) {
        for (var n = 0; n < task.next.length; n++) {
          var nId = task.next[n];
          if (branchTargets[nId]) continue;
          var nTo = layoutData[nId];
          if (!nTo || nTo.hidden) continue;

          if (nId === 'ending') {
            drawEndingEdges(svg, task.id, from);
            continue;
          }

          var idLabel2 = getIdentityLabel(task, nId);
          var e4 = drawEdge(svg, from, nTo, 'main', idLabel2);
          allEdges.push({ from:task.id, to:nId, type:'main', label:idLabel2, el:e4 });
        }
      }

      // 分支连线
      if (task.branches) {
        for (var b3 = 0; b3 < task.branches.length; b3++) {
          var br2 = task.branches[b3];
          var bTo2 = layoutData[br2.target];
          if (!bTo2) continue;
          var bIsA2 = br2.condition && br2.condition.indexOf('=A') > -1;
          var bType2 = bIsA2 ? 'branch-a' : 'branch-b';
          var e5 = drawEdge(svg, from, bTo2, bType2, br2.label);
          allEdges.push({ from:task.id, to:br2.target, type:bType2, label:br2.label, el:e5 });
        }
      }
    }

    // 失败连线（搞笑结局）
    if (task.canFail && task.failTarget) {
      var fTo = layoutData[task.failTarget];
      if (fTo) {
        var e6 = drawEdge(svg, from, fTo, 'fail', '失败');
        allEdges.push({ from:task.id, to:task.failTarget, type:'fail', el:e6 });
      }
    }
  }

}

function drawEdge(svg, from, to, type, label) {
  var g = svgEl('g', { 'class': 'edge-group' });

  // 计算起止点
  var x1 = from.x + from.w / 2;
  var y1 = from.y + from.h;
  var x2 = to.x + to.w / 2;
  var y2 = to.y;

  // 路径：直线或贝塞尔曲线（偏移节点用曲线）
  var path;
  var dx = Math.abs(x2 - x1);

  if (dx < 5) {
    // 垂直直线
    path = 'M' + x1 + ',' + y1 + ' L' + x2 + ',' + y2;
  } else {
    // 贝塞尔曲线
    var cy1 = y1 + (y2 - y1) * 0.4;
    var cy2 = y1 + (y2 - y1) * 0.6;
    path = 'M' + x1 + ',' + y1 +
           ' C' + x1 + ',' + cy1 + ' ' + x2 + ',' + cy2 + ' ' + x2 + ',' + y2;
  }

  var pathEl = svgEl('path', {
    d: path,
    'class': 'edge ' + type
  });
  g.appendChild(pathEl);

  // 箭头
  var arrowSize = 5;
  var ax = x2, ay = y2;
  var arrow = svgEl('polygon', {
    points: (ax - arrowSize) + ',' + (ay - arrowSize * 1.5) + ' ' +
            ax + ',' + ay + ' ' +
            (ax + arrowSize) + ',' + (ay - arrowSize * 1.5),
    'class': 'arrow-' + type
  });
  g.appendChild(arrow);

  // 标签
  if (label) {
    var lx = (x1 + x2) / 2;
    var ly = (y1 + y2) / 2 - 4;
    // 偏移避免覆盖连线
    if (dx > 5) lx += (x2 > x1 ? 12 : -12);
    var labelEl = svgEl('text', {
      x: lx, y: ly,
      'class': 'edge-label ' + type
    });
    labelEl.textContent = label;
    g.appendChild(labelEl);
  }

  // 插到 SVG 最前面（节点在连线上面）
  var firstNode = svg.querySelector('.node, .choice-node');
  if (firstNode) {
    svg.insertBefore(g, firstNode);
  } else {
    svg.appendChild(g);
  }

  return g;
}

function drawEndingEdges(svg, fromId, from) {
  for (var ei = 0; ei < ENDING_NODES.length; ei++) {
    var eTo = layoutData[ENDING_NODES[ei].id];
    if (!eTo) continue;
    var edge = drawEdge(svg, from, eTo, 'main', null);
    allEdges.push({ from:fromId, to:ENDING_NODES[ei].id, type:'main', el:edge });
  }
}

function buildDetailHTML(task) {
  var sub = task.sub || {};
  var grade = GRADES[task.grade] || GRADES.B;
  var html = '';

  // 关闭按钮
  html += '<button class="dp-close">&times;</button>';

  // 头部
  html += '<div class="dp-header">';
  html += '<span class="dp-title">' + task.title + '</span>';
  if (task.grade) {
    html += '<span class="dp-grade ' + task.grade + '">' + task.grade + '</span>';
  }
  if (task.category) {
    var catClass = task.category === '情感' ? 'emotion' : 'career';
    html += '<span class="dp-category ' + catClass + '">' + task.category + '</span>';
  }
  html += '</div>';

  // 描述（支持级联 descA/descB）
  var desc = sub.desc || '';
  if (sub.descA) desc += '\n\n<b style="color:#e0c080">A线：</b>' + sub.descA;
  if (sub.descB) desc += '\n\n<b style="color:#80b0e0">B线：</b>' + sub.descB;
  if (desc) {
    html += '<div class="dp-section">';
    html += '<div class="dp-label">描述</div>';
    html += '<div class="dp-text">' + desc + '</div>';
    html += '</div>';
  }

  // 多步骤
  if (sub.steps && sub.steps.length) {
    html += '<div class="dp-section">';
    html += '<div class="dp-label">步骤</div>';
    html += '<div class="dp-steps">';
    for (var s = 0; s < sub.steps.length; s++) {
      html += '<div class="dp-step">';
      html += '<span class="dp-step-num">' + (s + 1) + '.</span>';
      html += '<span class="dp-step-label">' + sub.steps[s].label + '</span>';
      html += '<span class="dp-step-result"> — ' + sub.steps[s].result + '</span>';
      html += '</div>';
    }
    html += '</div></div>';
  }

  // 选择分支
  if (sub.choices) {
    html += '<div class="dp-section">';
    html += '<div class="dp-label">选择</div>';
    html += '<div class="dp-choices">';
    var keys = Object.keys(sub.choices);
    for (var c = 0; c < keys.length; c++) {
      var ck = keys[c];
      var ch = sub.choices[ck];
      // 判断标签颜色
      var tagClass = '';
      if (ck === 'A' || ck === 'revealA' || ck === 'silentA') tagClass = 'tag-a';
      else tagClass = 'tag-b';
      html += '<div class="dp-choice">';
      html += '<div class="dp-choice-label"><span class="' + tagClass + '">[' + ck.toUpperCase() + ']</span> ' + ch.label + '</div>';
      if (ch.desc) html += '<div class="dp-choice-desc">' + ch.desc + '</div>';
      html += '</div>';
    }
    html += '</div></div>';
  }

  // 进展（支持级联 resultA/resultB 及更多变体）
  var resultParts = [];
  if (sub.result) resultParts.push(sub.result);
  if (sub.resultA) resultParts.push('<b style="color:#e0c080">A：</b>' + sub.resultA);
  if (sub.resultB) resultParts.push('<b style="color:#80b0e0">B：</b>' + sub.resultB);
  if (sub.resultRevealA) resultParts.push('<b style="color:#e0c080">揭穿A：</b>' + sub.resultRevealA);
  if (sub.resultRevealB) resultParts.push('<b style="color:#80b0e0">揭穿B：</b>' + sub.resultRevealB);
  if (sub.resultSilentA) resultParts.push('<b style="color:#e0c080">沉默A：</b>' + sub.resultSilentA);
  if (sub.resultSilentB) resultParts.push('<b style="color:#80b0e0">沉默B：</b>' + sub.resultSilentB);
  if (sub.resultA_reveal) resultParts.push('<b style="color:#e0c080">A·揭穿：</b>' + sub.resultA_reveal);
  if (sub.resultA_silent) resultParts.push('<b style="color:#e0c080">A·沉默：</b>' + sub.resultA_silent);
  if (sub.resultB_reveal) resultParts.push('<b style="color:#80b0e0">B·揭穿：</b>' + sub.resultB_reveal);
  if (sub.resultB_silent) resultParts.push('<b style="color:#80b0e0">B·沉默：</b>' + sub.resultB_silent);
  if (sub.conv) resultParts.push('<b style="color:#888">汇合：</b>' + sub.conv);
  var resultHtml = resultParts.join('\n\n');

  if (resultHtml) {
    html += '<div class="dp-section">';
    html += '<div class="dp-label">进展</div>';
    html += '<div class="dp-text result">' + resultHtml + '</div>';
    html += '</div>';
  }

  // 金筹码备注
  if (sub.chipNote) {
    html += '<div class="dp-chip-note">🔑 ' + sub.chipNote + '</div>';
  }

  // 男主反应
  var mr = sub.maleReactions;
  if (mr) {
    html += '<div class="dp-section">';
    html += '<div class="dp-label">男主反应</div>';
    html += '<div class="dp-reactions">';
    var maleKeys = ['he', 'ban', 'sho'];
    var maleNames = { he:'荷官', ban:'老板', sho:'打手' };
    for (var m = 0; m < maleKeys.length; m++) {
      var mk = maleKeys[m];
      var activeClass = (selectedMale === mk) ? ' active' : '';

      // 收集该男主所有反应文本
      var rTexts = [];
      if (mr[mk]) rTexts.push(mr[mk]);
      if (mr[mk + 'A']) rTexts.push('<b style="color:#e0c080">A：</b>' + mr[mk + 'A']);
      if (mr[mk + 'B']) rTexts.push('<b style="color:#80b0e0">B：</b>' + mr[mk + 'B']);
      if (mr[mk + 'RevealA'] || mr[mk.toLowerCase() + 'RevealA']) {
        var ra = mr[mk + 'RevealA'] || mr[mk.toLowerCase() + 'RevealA'] || '';
        if (ra) rTexts.push('<b style="color:#e0c080">揭穿A：</b>' + ra);
      }
      if (mr[mk + 'RevealB'] || mr[mk.toLowerCase() + 'RevealB']) {
        var rb = mr[mk + 'RevealB'] || mr[mk.toLowerCase() + 'RevealB'] || '';
        if (rb) rTexts.push('<b style="color:#80b0e0">揭穿B：</b>' + rb);
      }
      if (mr[mk + 'SilentA'] || mr[mk.toLowerCase() + 'SilentA']) {
        var sa = mr[mk + 'SilentA'] || mr[mk.toLowerCase() + 'SilentA'] || '';
        if (sa) rTexts.push('<b style="color:#e0c080">沉默A：</b>' + sa);
      }
      if (mr[mk + 'SilentB'] || mr[mk.toLowerCase() + 'SilentB']) {
        var sb = mr[mk + 'SilentB'] || mr[mk.toLowerCase() + 'SilentB'] || '';
        if (sb) rTexts.push('<b style="color:#80b0e0">沉默B：</b>' + sb);
      }

      var rText = rTexts.length ? rTexts.join('<br>') : '—';

      html += '<div class="dp-reaction' + activeClass + '">';
      html += '<div class="dp-r-name">' + maleNames[mk] + '</div>';
      html += '<div class="dp-r-text">' + rText + '</div>';
      html += '</div>';
    }
    html += '</div></div>';
  }

  return html;
}

}

function clearCombo() {
  selectedFemale = null;
  selectedMale = null;
  var btns = document.querySelectorAll('.sel-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  applyComboFilter();
}

function applyComboFilter() {
  var bothSelected = !!(selectedFemale && selectedMale);
  var anySelected = !!(selectedFemale || selectedMale);
  var label = document.getElementById('comboLabel');
  var clearBtn = document.getElementById('clearBtn');

  if (anySelected) {
    var fName = selectedFemale ? FEMALES[selectedFemale].name : '…';
    var mName = selectedMale ? MALES[selectedMale].name : '…';
    label.textContent = fName + ' × ' + mName;
    clearBtn.style.display = '';
  } else {
    label.textContent = '选择身份组合查看任务路径';
    clearBtn.style.display = 'none';
  }

  // 判断一个任务是否匹配当前筛选
  function taskMatch(taskId) {
    var t = TASK_MAP[taskId];
    if (!t) return false;
    var fMatch = !selectedFemale || t.forFemale === 'all' || t.forFemale === selectedFemale;
    var mMatch = !selectedMale || t.forMale === 'all' || t.forMale === selectedMale;
    return fMatch && mMatch;
  }

  // 搞笑结局匹配
  function funnyMatch(funnyId) {
    var f = FUNNY[funnyId];
    if (!f) return false;
    return !selectedFemale || f.forFemale === 'all' || f.forFemale === selectedFemale;
  }

  // 构建匹配ID集合（任务+选择+搞笑+结局）
  var matchedIds = {};
  for (var i = 0; i < TASKS.length; i++) {
    var t = TASKS[i];
    if (t.type === 'ending') { matchedIds[t.id] = true; continue; }
    if (taskMatch(t.id)) matchedIds[t.id] = true;
  }
  // 选择子节点跟随父任务
  for (var ci = 0; ci < CHOICE_NODES.length; ci++) {
    if (matchedIds[CHOICE_NODES[ci].parentId]) matchedIds[CHOICE_NODES[ci].id] = true;
  }
  // 搞笑结局
  for (var fi = 0; fi < FUNNY_NODES.length; fi++) {
    var fn = FUNNY_NODES[fi];
    if (matchedIds[fn.sourceId] && funnyMatch(fn.id)) matchedIds[fn.id] = true;
  }
  // 结局节点始终匹配
  for (var ei = 0; ei < ENDING_NODES.length; ei++) {
    matchedIds[ENDING_NODES[ei].id] = true;
  }
  // 更新结局节点的身份组合标签 + 标题位置
  var endingTitles = document.querySelectorAll('.ending-title');
  var comboLabels = document.querySelectorAll('.ending-combo-label');
  for (var li = 0; li < comboLabels.length; li++) {
    var parentRect = comboLabels[li].parentNode.querySelector('.node-bg');
    var h = parentRect ? +parentRect.getAttribute('height') : 60;
    if (bothSelected) {
      var fName = FEMALES[selectedFemale].name;
      var mName = MALES[selectedMale].name;
      comboLabels[li].textContent = fName + '×' + mName + ' 版';
      comboLabels[li].setAttribute('display', '');
    } else {
      comboLabels[li].setAttribute('display', 'none');
    }
  }
  for (var ti = 0; ti < endingTitles.length; ti++) {
    var pRect = endingTitles[ti].parentNode.querySelector('.node-bg');
    var th = pRect ? +pRect.getAttribute('height') : 60;
    endingTitles[ti].setAttribute('y', bothSelected ? (th / 2 - 2) : (th / 2 + 5));
  }

  // ── 所有节点（任务+搞笑+结局）──
  var allNodes = document.querySelectorAll('#chart .node');
  for (var ni = 0; ni < allNodes.length; ni++) {
    var el = allNodes[ni];
    var id = el.getAttribute('data-id');
    el.classList.remove('dimmed', 'highlighted');
    if (!bothSelected) {
      el.classList.add('dimmed');
    } else {
      el.classList.add(matchedIds[id] ? 'highlighted' : 'dimmed');
    }
  }

  // ── 选择子节点 ──
  var allChoices = document.querySelectorAll('#chart .choice-node');
  for (var j = 0; j < allChoices.length; j++) {
    var cel = allChoices[j];
    var cid = cel.getAttribute('data-id');
    cel.classList.remove('dimmed', 'highlighted');
    if (!bothSelected) {
      cel.classList.add('dimmed');
    } else {
      cel.classList.add(matchedIds[cid] ? 'highlighted' : 'dimmed');
    }
  }

  // ── 连线 ──
  var allEdgeGroups = document.querySelectorAll('#chart .edge-group');
  for (var k = 0; k < allEdgeGroups.length; k++) {
    var eg = allEdgeGroups[k];
    eg.classList.remove('dimmed', 'highlighted');
    if (!bothSelected) {
      eg.classList.add('dimmed');
    } else {
      var edgeData = allEdges[k];
      if (edgeData && matchedIds[edgeData.from] && matchedIds[edgeData.to]) {
        eg.classList.add('highlighted');
      } else {
        eg.classList.add('dimmed');
      }
    }
  }

  // ── 刷新详情面板中男主反应的高亮 ──
  if (currentPanel && currentNodeId) {
    var task = TASK_MAP[currentNodeId];
    if (task) {
      closePanel();
      onNodeClick(currentNodeId);
    }
  }
}

// ── 初始化 ──
document.addEventListener('DOMContentLoaded', function() {
  computeLayout();
  renderChart();
  renderEdges();
  applyComboFilter();
});
</script>

</body>
